<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据加载测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .section {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .section h2 {
            color: #666;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .dq-card, .kw-item, .ds-card {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #007bff;
        }
        .kw-left {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .kw-badge {
            background: #007bff;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        .kw-term {
            font-weight: bold;
            color: #333;
            font-size: 18px;
            margin-bottom: 8px;
        }
        .kw-def {
            color: #666;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .kw-eg {
            color: #888;
            font-size: 14px;
            font-style: italic;
        }
        .ds-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .ds-topic {
            font-weight: bold;
            color: #333;
            font-size: 16px;
        }
        .ds-domain-badge {
            background: #28a745;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        .ds-num-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin: 15px 0;
        }
        .ds-num {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .ds-num-label {
            font-size: 14px;
            opacity: 0.9;
        }
        .ds-section-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .ds-ctx {
            color: #555;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        .ds-sense {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            border-top: 1px dashed #ddd;
            padding-top: 10px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin: 10px 0;
        }
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 6px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>数据加载测试页面</h1>
    
    <div class="section">
        <h2>📋 今日三问</h2>
        <div id="dq-grid" class="loading">加载中...</div>
    </div>
    
    <div class="section">
        <h2>📚 每日五词</h2>
        <div id="kw-list" class="loading">加载中...</div>
    </div>
    
    <div class="section">
        <h2>📊 今日数感</h2>
        <div id="ds-grid" class="loading">加载中...</div>
    </div>
    
    <div id="test-results" style="margin-top: 30px; padding: 20px; background: white; border-radius: 8px;"></div>

    <script src="js/main.js"></script>
    <script>
        // 等待主脚本加载完成
        setTimeout(() => {
            runTests();
        }, 2000);
        
        async function runTests() {
            const results = document.getElementById('test-results');
            results.innerHTML = '<div class="loading">正在测试数据加载...</div>';
            
            try {
                // 测试1: 今日三问
                const result1 = await loadDailyQuestions();
                const dqGrid = document.getElementById('dq-grid');
                const questionCount = dqGrid.querySelectorAll('.dq-card').length;
                
                // 测试2: 每日五词
                const result2 = await loadDailyKeywords();
                const kwList = document.getElementById('kw-list');
                const keywordCount = kwList.querySelectorAll('.kw-item').length;
                
                // 测试3: 今日数感
                const result3 = await loadDailyData();
                const dsGrid = document.getElementById('ds-grid');
                const dataCount = dsGrid.querySelectorAll('.ds-card').length;
                
                // 显示结果
                let html = '<h3>测试结果</h3>';
                
                if (questionCount >= 3) {
                    html += `<div class="success">✅ 今日三问: 成功加载 ${questionCount} 个问题</div>`;
                } else {
                    html += `<div class="error">❌ 今日三问: 只加载了 ${questionCount} 个问题（期望3个）</div>`;
                }
                
                if (keywordCount >= 5) {
                    html += `<div class="success">✅ 每日五词: 成功加载 ${keywordCount} 个词汇</div>`;
                } else {
                    html += `<div class="error">❌ 每日五词: 只加载了 ${keywordCount} 个词汇（期望5个）</div>`;
                }
                
                if (dataCount >= 6) {
                    html += `<div class="success">✅ 今日数感: 成功加载 ${dataCount} 个数据集</div>`;
                } else {
                    html += `<div class="error">❌ 今日数感: 只加载了 ${dataCount} 个数据集（期望6个）</div>`;
                }
                
                results.innerHTML = html;
                
                // 滚动到结果
                results.scrollIntoView({ behavior: 'smooth' });
                
            } catch (error) {
                results.innerHTML = `<div class="error">❌ 测试失败: ${error.message}</div>`;
                console.error('测试错误:', error);
            }
        }
    </script>
</body>
</html>
