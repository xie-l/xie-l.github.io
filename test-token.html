<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token 测试 - GitHub个人主页</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .section {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .token-display {
            font-family: 'Courier New', monospace;
            background: #e9ecef;
            padding: 10px;
            border-radius: 4px;
            word-break: break-all;
            margin: 10px 0;
        }
        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover {
            background: #0056b3;
        }
        .btn-danger {
            background: #dc3545;
        }
        .btn-danger:hover {
            background: #c82333;
        }
        .result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .result.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        label {
            display: block;
            margin: 10px 0 5px 0;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .permissions {
            margin: 10px 0;
        }
        .permission-item {
            padding: 5px;
            margin: 2px 0;
            background: #e9ecef;
            border-radius: 3px;
        }
        .permission-item.granted {
            background: #d4edda;
        }
        .permission-item.denied {
            background: #f8d7da;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 GitHub Token 测试工具</h1>
        
        <div class="section">
            <h2>1. 检查本地存储的 Token</h2>
            <button class="btn" onclick="checkStoredToken()">检查存储的 Token</button>
            <div id="tokenResult" class="result"></div>
        </div>

        <div class="section">
            <h2>2. 手动输入 Token 测试</h2>
            <label for="manualToken">GitHub Personal Access Token:</label>
            <input type="text" id="manualToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
            
            <label for="manualRepo">仓库名称 (如: xie-l.github.io):</label>
            <input type="text" id="manualRepo" value="xie-l.github.io">
            
            <button class="btn" onclick="testManualToken()">测试 Token</button>
            <div id="manualResult" class="result"></div>
        </div>

        <div class="section">
            <h2>3. 测试 API 调用</h2>
            <button class="btn" onclick="testApiCall()" id="testApiBtn" disabled>测试 API 调用</button>
            <div id="apiResult" class="result"></div>
        </div>

        <div class="section">
            <h2>4. 权限检查</h2>
            <div id="permissions" class="permissions"></div>
        </div>

        <div class="section">
            <h2>5. 操作</h2>
            <button class="btn btn-danger" onclick="clearToken()">清除本地 Token</button>
            <button class="btn" onclick="goToLogin()">前往登录页面</button>
        </div>
    </div>

    <script>
        let currentToken = null;
        let currentRepo = null;
        let currentOwner = null;

        function checkStoredToken() {
            const token = localStorage.getItem('github_token');
            const repo = localStorage.getItem('github_repo');
            const owner = localStorage.getItem('github_owner');
            
            const result = document.getElementById('tokenResult');
            
            if (!token) {
                result.className = 'result error';
                result.textContent = '❌ 未找到存储的 Token，请先登录';
                result.style.display = 'block';
                return;
            }
            
            currentToken = token;
            currentRepo = repo;
            currentOwner = owner;
            
            // 显示token信息（隐藏中间部分）
            const tokenPreview = token.substring(0, 10) + '...' + token.substring(token.length - 10);
            
            result.className = 'result success';
            result.innerHTML = `
                ✅ 找到存储的 Token<br>
                <strong>Token 预览:</strong> ${tokenPreview}<br>
                <strong>仓库:</strong> ${repo || '未设置'}<br>
                <strong>所有者:</strong> ${owner || '未设置'}<br>
                <strong>Token 长度:</strong> ${token.length} 字符
            `;
            result.style.display = 'block';
            
            // 启用API测试按钮
            document.getElementById('testApiBtn').disabled = false;
            
            // 检查token格式
            checkTokenFormat(token);
        }

        function checkTokenFormat(token) {
            const permissions = document.getElementById('permissions');
            permissions.innerHTML = '<h3>Token 格式检查:</h3>';
            
            const checks = [
                {
                    name: 'Token 不为空',
                    pass: token && token.length > 0
                },
                {
                    name: 'Token 以 ghp_ 开头 (Classic)',
                    pass: token.startsWith('ghp_')
                },
                {
                    name: 'Token 以 github_pat_ 开头 (Fine-grained)',
                    pass: token.startsWith('github_pat_')
                },
                {
                    name: 'Token 长度合理 ( > 30 )',
                    pass: token.length > 30
                }
            ];
            
            checks.forEach(check => {
                const div = document.createElement('div');
                div.className = 'permission-item ' + (check.pass ? 'granted' : 'denied');
                div.textContent = (check.pass ? '✓' : '✗') + ' ' + check.name;
                permissions.appendChild(div);
            });
        }

        function testManualToken() {
            const token = document.getElementById('manualToken').value.trim();
            const repo = document.getElementById('manualRepo').value.trim() || 'xie-l.github.io';
            
            if (!token) {
                alert('请输入 Token');
                return;
            }
            
            currentToken = token;
            currentRepo = repo;
            currentOwner = repo.split('.')[0];
            
            const result = document.getElementById('manualResult');
            result.className = 'result info';
            result.textContent = '正在测试 Token...';
            result.style.display = 'block';
            
            // 测试API
            testGitHubApi(token, currentOwner, currentRepo, 'manualResult');
        }

        function testApiCall() {
            if (!currentToken || !currentOwner || !currentRepo) {
                alert('请先检查存储的 Token 或手动输入 Token');
                return;
            }
            
            const result = document.getElementById('apiResult');
            result.className = 'result info';
            result.textContent = '正在调用 GitHub API...';
            result.style.display = 'block';
            
            testGitHubApi(currentToken, currentOwner, currentRepo, 'apiResult');
        }

        async function testGitHubApi(token, owner, repo, resultElementId) {
            const result = document.getElementById(resultElementId);
            
            try {
                // 测试1: 获取用户信息
                const userResponse = await fetch('https://api.github.com/user', {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (!userResponse.ok) {
                    throw new Error(`用户信息获取失败: ${userResponse.status} ${userResponse.statusText}`);
                }
                
                const userData = await userResponse.json();
                
                // 测试2: 检查仓库访问权限
                const repoResponse = await fetch(`https://api.github.com/repos/${owner}/${repo}`, {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                let repoAccess = '无法访问';
                let canPush = false;
                
                if (repoResponse.ok) {
                    const repoData = await repoResponse.json();
                    repoAccess = '可以访问';
                    canPush = repoData.permissions && repoData.permissions.push;
                }
                
                // 显示结果
                result.className = 'result success';
                result.innerHTML = `
                    ✅ Token 有效！<br>
                    <strong>用户:</strong> ${userData.login}<br>
                    <strong>仓库:</strong> ${owner}/${repo} (${repoAccess})<br>
                    <strong>推送权限:</strong> ${canPush ? '✓ 有' : '✗ 无'}
                `;
                
                // 显示详细权限
                showDetailedPermissions(userData, canPush);
                
            } catch (error) {
                result.className = 'result error';
                result.innerHTML = `
                    ❌ Token 测试失败<br>
                    <strong>错误:</strong> ${error.message}<br><br>
                    可能原因:<br>
                    • Token 无效或已过期<br>
                    • Token 权限不足<br>
                    • 网络连接问题<br>
                    • 仓库名称错误
                `;
                
                showDetailedPermissions(null, false, error.message);
            }
        }

        function showDetailedPermissions(userData, canPush, error = null) {
            const permissions = document.getElementById('permissions');
            permissions.innerHTML = '<h3>详细权限检查:</h3>';
            
            if (error) {
                const div = document.createElement('div');
                div.className = 'permission-item denied';
                div.textContent = '✗ API 调用失败: ' + error;
                permissions.appendChild(div);
                return;
            }
            
            const checks = [
                {
                    name: 'Token 有效',
                    pass: !!userData
                },
                {
                    name: '读取用户信息',
                    pass: !!userData && !!userData.login
                },
                {
                    name: '访问仓库',
                    pass: true // 我们已经测试过
                },
                {
                    name: '推送权限 (push)',
                    pass: canPush
                },
                {
                    name: 'Token 未过期',
                    pass: !!userData
                }
            ];
            
            checks.forEach(check => {
                const div = document.createElement('div');
                div.className = 'permission-item ' + (check.pass ? 'granted' : 'denied');
                div.textContent = (check.pass ? '✓' : '✗') + ' ' + check.name;
                permissions.appendChild(div);
            });
        }

        function clearToken() {
            if (confirm('确定要清除本地存储的 GitHub Token 吗？')) {
                localStorage.removeItem('github_token');
                localStorage.removeItem('github_repo');
                localStorage.removeItem('github_owner');
                
                const result = document.getElementById('tokenResult');
                result.className = 'result info';
                result.textContent = '✓ Token 已清除';
                result.style.display = 'block';
                
                document.getElementById('testApiBtn').disabled = true;
                document.getElementById('permissions').innerHTML = '';
                
                setTimeout(() => {
                    result.style.display = 'none';
                }, 3000);
            }
        }

        function goToLogin() {
            window.location.href = '/admin/login.html';
        }

        // 页面加载时自动检查存储的token
        window.onload = function() {
            checkStoredToken();
        };
    </script>
</body>
</html>
