<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背景测试 - Three.js</title>
    <style>
        body { margin: 0; font-family: sans-serif; }
        .test-section { padding: 20px; margin: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .success { border-color: #10b981; background: #f0fdf4; }
        .error { border-color: #ef4444; background: #fef2f2; }
        pre { background: #f8fafc; padding: 12px; border-radius: 6px; overflow-x: auto; }
        #hero-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; display: block; }
        .banner { position: relative; height: 520px; overflow: hidden; }
        .banner-bg-fallback { position: absolute; inset: 0; background: linear-gradient(135deg, #0a192f 0%, #112240 55%, #233554 100%); z-index: -2; }
    </style>
</head>
<body>
    <h1 style="padding: 20px;">Three.js 背景测试</h1>
    
    <div class="test-section">
        <h2>测试1: Three.js 库加载</h2>
        <div id="test1-result"></div>
    </div>

    <div class="test-section">
        <h2>测试2: Canvas 元素</h2>
        <div id="test2-result"></div>
    </div>

    <div class="test-section">
        <h2>测试3: WebGL 支持</h2>
        <div id="test3-result"></div>
    </div>

    <div class="test-section">
        <h2>测试4: 初始化函数</h2>
        <div id="test4-result"></div>
    </div>

    <div class="banner" id="test-banner">
        <canvas id="hero-canvas"></canvas>
        <div class="banner-bg-fallback"></div>
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: white;">
            <h1>氢能驱动未来</h1>
            <p>如果看到动态粒子背景，说明Three.js工作正常</p>
        </div>
    </div>

    <div class="test-section">
        <h2>测试5: 实际初始化</h2>
        <button onclick="runInitTest()">运行初始化测试</button>
        <div id="test5-result"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        function setResult(testId, success, message) {
            const resultEl = document.getElementById(testId);
            resultEl.innerHTML = `<div class="${success ? 'success' : 'error'}"><strong>${success ? '✓ 通过' : '✗ 失败'}</strong>: ${message}</div>`;
        }

        // 测试1: Three.js 库
        if (typeof THREE !== 'undefined') {
            setResult('test1-result', true, `Three.js 已加载，版本: ${THREE.REVISION}`);
        } else {
            setResult('test1-result', false, 'Three.js 未加载');
        }

        // 测试2: Canvas 元素
        const canvas = document.getElementById('hero-canvas');
        if (canvas) {
            setResult('test2-result', true, `Canvas 元素存在: ${canvas.width}x${canvas.height}`);
        } else {
            setResult('test2-result', false, 'Canvas 元素未找到');
        }

        // 测试3: WebGL 支持
        if (canvas) {
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            if (gl) {
                setResult('test3-result', true, 'WebGL 支持正常');
            } else {
                setResult('test3-result', false, 'WebGL 不支持');
            }
        }

        // 测试4: 初始化函数
        if (typeof initThreeJSBackground === 'function') {
            setResult('test4-result', true, 'initThreeJSBackground 函数已定义');
        } else {
            setResult('test4-result', false, 'initThreeJSBackground 函数未定义');
        }

        // 从main.js复制的初始化函数
        let scene, camera, renderer, particles;
        let backgroundInitialized = false;

        function initThreeJSBackground() {
            if (backgroundInitialized) return;
            
            try {
                const canvas = document.getElementById('hero-canvas');
                if (!canvas) {
                    setResult('test5-result', false, 'Canvas not found');
                    return;
                }
                
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (!gl) {
                    setResult('test5-result', false, 'WebGL not supported');
                    return;
                }
                
                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                renderer = new THREE.WebGLRenderer({
                    canvas: canvas,
                    alpha: true,
                    antialias: true,
                    powerPreference: 'high-performance'
                });
                
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.setSize(window.innerWidth, 520);
                
                const particlesGeometry = new THREE.BufferGeometry();
                const particlesCount = 3000;
                const posArray = new Float32Array(particlesCount * 3);
                
                for (let i = 0; i < particlesCount * 3; i++) {
                    posArray[i] = (Math.random() - 0.5) * 10;
                }
                
                particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                
                const particlesMaterial = new THREE.PointsMaterial({
                    size: 0.005,
                    color: '#64ffda',
                    transparent: true,
                    opacity: 0.6,
                    blending: THREE.AdditiveBlending
                });
                
                particles = new THREE.Points(particlesGeometry, particlesMaterial);
                scene.add(particles);
                
                camera.position.z = 2;
                
                const fallbackBg = document.querySelector('.banner-bg-fallback');
                if (fallbackBg) {
                    fallbackBg.style.opacity = '0';
                }
                
                backgroundInitialized = true;
                animateBackground();
                
                setResult('test5-result', true, 'Three.js background initialized successfully');
                
            } catch (error) {
                setResult('test5-result', false, 'Error: ' + error.message);
            }
        }

        function animateBackground() {
            if (!backgroundInitialized || !particles) return;
            
            requestAnimationFrame(animateBackground);
            
            particles.rotation.x += 0.0005;
            particles.rotation.y += 0.0005;
            
            renderer.render(scene, camera);
        }

        function runInitTest() {
            initThreeJSBackground();
        }

        // 自动运行测试5
        setTimeout(runInitTest, 500);
    </script>
</body>
</html>
