name: Fetch Weather Data

on:
  schedule:
    - cron: '5 */2 * * *'  # 每2小时第5分钟执行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Fetch 7-day forecast for 5 cities (Open-Meteo)
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os
          from datetime import datetime, timezone

          CITIES = [
              {'name': '北京',   'q': 'Beijing',  'lat': 39.9042, 'lon': 116.4074},
              {'name': '上海',   'q': 'Shanghai', 'lat': 31.2304, 'lon': 121.4737},
              {'name': '南昌',   'q': 'Nanchang', 'lat': 28.6820, 'lon': 115.8579},
              {'name': '西宁',   'q': 'Xining',   'lat': 36.6171, 'lon': 101.7782},
              {'name': '哈尔滨', 'q': 'Harbin',   'lat': 45.8038, 'lon': 126.5349},
          ]

          # WMO 天气代码 → (emoji, 中文描述)
          WMO_MAP = {
              0:  ('☀️',  '晴'),
              1:  ('🌤️', '晴间多云'),
              2:  ('⛅',  '多云'),
              3:  ('☁️',  '阴'),
              45: ('🌫️', '雾'),
              48: ('🌫️', '雾'),
              51: ('🌦️', '小雨'),
              53: ('🌦️', '小雨'),
              55: ('🌧️', '中雨'),
              61: ('🌦️', '小雨'),
              63: ('🌧️', '中雨'),
              65: ('🌧️', '大雨'),
              71: ('🌨️', '小雪'),
              73: ('🌨️', '中雪'),
              75: ('❄️',  '大雪'),
              77: ('🌨️', '雪粒'),
              80: ('🌦️', '阵雨'),
              81: ('🌧️', '阵雨'),
              82: ('🌧️', '强阵雨'),
              85: ('🌨️', '阵雪'),
              86: ('❄️',  '强阵雪'),
              95: ('⛈️',  '雷阵雨'),
              96: ('⛈️',  '雷阵雨'),
              99: ('⛈️',  '雷阵雨'),
          }

          def wmo(code):
              try:
                  return WMO_MAP.get(int(code), ('🌡️', '未知'))
              except Exception:
                  return ('🌡️', '未知')

          now_utc = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
          result = {}

          for city in CITIES:
              try:
                  url = (
                      f'https://api.open-meteo.com/v1/forecast'
                      f'?latitude={city["lat"]}&longitude={city["lon"]}'
                      f'&current_weather=true'
                      f'&daily=weathercode,temperature_2m_max,temperature_2m_min'
                      f'&timezone=Asia%2FShanghai&forecast_days=7'
                  )
                  req = urllib.request.Request(url, headers={'User-Agent': 'curl/7.79.1'})
                  with urllib.request.urlopen(req, timeout=12) as r:
                      data = json.load(r)

                  cur  = data.get('current_weather', {})
                  cur_icon, cur_desc = wmo(cur.get('weathercode', 0))

                  daily = data.get('daily', {})
                  dates = daily.get('time', [])
                  codes = daily.get('weathercode', [])
                  maxes = daily.get('temperature_2m_max', [])
                  mines = daily.get('temperature_2m_min', [])

                  forecast = []
                  for i, date in enumerate(dates[:7]):
                      icon, desc = wmo(codes[i] if i < len(codes) else 0)
                      forecast.append({
                          'date': date,
                          'icon': icon,
                          'desc': desc,
                          'max':  round(maxes[i]) if i < len(maxes) else '--',
                          'min':  round(mines[i]) if i < len(mines) else '--',
                      })

                  result[city['q']] = {
                      'name':    city['name'],
                      'current': {
                          'temp': round(cur.get('temperature', 0)),
                          'icon': cur_icon,
                          'desc': cur_desc,
                      },
                      'daily':   forecast,
                      'updated': now_utc,
                  }
                  print(f"[OK] {city['name']}: {cur.get('temperature')}°C {cur_desc}, 7天={len(forecast)}条")

              except Exception as e:
                  print(f"[ERR] {city['name']}: {e}")
                  result[city['q']] = {
                      'name':    city['name'],
                      'current': {'temp': '--', 'icon': '🌡️', 'desc': '暂无数据'},
                      'daily':   [],
                      'updated': now_utc,
                  }

          os.makedirs('data', exist_ok=True)
          with open('data/weather.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          print('Wrote data/weather.json successfully.')
          PYEOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weather.json
          git diff --staged --quiet \
            && echo "No changes." \
            || (git commit -m "chore: update weather data [skip ci]" \
                && git pull --rebase origin main \
                && git push)
