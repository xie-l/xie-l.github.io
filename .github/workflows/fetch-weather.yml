name: Fetch Weather Data

on:
  schedule:
    - cron: '5 */2 * * *'  # 每2小时第5分钟执行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Fetch weather for 5 cities (wttr.in)
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os
          from datetime import datetime, timezone

          CITIES = [
              {'name': '北京',   'q': 'Beijing'},
              {'name': '上海',   'q': 'Shanghai'},
              {'name': '南昌',   'q': 'Nanchang'},
              {'name': '西宁',   'q': 'Xining'},
              {'name': '哈尔滨', 'q': 'Harbin'},
          ]

          # wttr.in weatherCode → (emoji, 中文描述)
          WTTR_MAP = {
              113: ('☀️',  '晴'),
              116: ('⛅',  '多云'),
              119: ('☁️',  '阴天'),
              122: ('☁️',  '阴'),
              143: ('🌫️', '雾'),
              176: ('🌦️', '小雨'),
              179: ('🌨️', '小雪'),
              182: ('🌨️', '雨夹雪'),
              185: ('🌧️', '冰雨'),
              200: ('⛈️',  '雷阵雨'),
              227: ('🌨️', '大雪'),
              230: ('❄️',  '暴雪'),
              248: ('🌫️', '大雾'),
              260: ('🌫️', '冻雾'),
              263: ('🌦️', '毛毛雨'),
              266: ('🌦️', '小雨'),
              281: ('🌧️', '冰雨'),
              284: ('🌧️', '冻雨'),
              293: ('🌦️', '小雨'),
              296: ('🌦️', '小雨'),
              299: ('🌧️', '中雨'),
              302: ('🌧️', '中雨'),
              305: ('🌧️', '大雨'),
              308: ('🌧️', '暴雨'),
              311: ('🌧️', '冻雨'),
              314: ('🌧️', '冻雨'),
              317: ('🌨️', '雨夹雪'),
              320: ('🌨️', '雨夹雪'),
              323: ('🌨️', '小雪'),
              326: ('🌨️', '小雪'),
              329: ('❄️',  '中雪'),
              332: ('❄️',  '中雪'),
              335: ('❄️',  '大雪'),
              338: ('❄️',  '暴雪'),
              350: ('🌧️', '冰粒'),
              353: ('🌦️', '阵雨'),
              356: ('🌧️', '阵雨'),
              359: ('🌧️', '暴雨'),
              362: ('🌨️', '雨夹雪'),
              365: ('🌨️', '雨夹雪'),
              368: ('🌨️', '阵雪'),
              371: ('❄️',  '阵雪'),
              374: ('🌧️', '冰粒'),
              377: ('🌧️', '冰粒'),
              386: ('⛈️',  '雷阵雨'),
              389: ('⛈️',  '强雷雨'),
              392: ('⛈️',  '雷雪'),
              395: ('⛈️',  '强雷雪'),
          }

          def wmap(code):
              try:
                  return WTTR_MAP.get(int(code), ('🌡️', '未知'))
              except Exception:
                  return ('🌡️', '未知')

          now_utc = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
          result = {}

          for city in CITIES:
              try:
                  url = 'https://wttr.in/' + city['q'] + '?format=j1'
                  req = urllib.request.Request(url, headers={
                      'User-Agent': 'curl/7.79.1',
                      'Accept': 'application/json'
                  })
                  with urllib.request.urlopen(req, timeout=20) as r:
                      data = json.load(r)

                  cur  = data['current_condition'][0]
                  temp = int(cur.get('temp_C', 0))
                  code = int(cur.get('weatherCode', 113))
                  icon, desc = wmap(code)

                  # 3天预报（wttr.in 最多3天）
                  forecast = []
                  for day in data.get('weather', [])[:3]:
                      # 取正午时段（hourly index 4 ≈ 12:00）的天气码
                      hourly = day.get('hourly', [])
                      d_code = int(hourly[4].get('weatherCode', code)) if len(hourly) > 4 else code
                      d_icon, d_desc = wmap(d_code)
                      forecast.append({
                          'date': day.get('date', ''),
                          'icon': d_icon,
                          'desc': d_desc,
                          'max':  int(day.get('maxtempC', 0)),
                          'min':  int(day.get('mintempC', 0)),
                      })

                  result[city['q']] = {
                      'name':    city['name'],
                      'current': {'temp': temp, 'icon': icon, 'desc': desc},
                      'daily':   forecast,
                      'updated': now_utc,
                  }
                  print('[OK] ' + city['name'] + ': ' + str(temp) + 'C ' + desc + ', ' + str(len(forecast)) + '天预报')

              except Exception as e:
                  print('[ERR] ' + city['name'] + ': ' + str(e))
                  result[city['q']] = {
                      'name':    city['name'],
                      'current': {'temp': '--', 'icon': '🌡️', 'desc': '暂无数据'},
                      'daily':   [],
                      'updated': now_utc,
                  }

          os.makedirs('data', exist_ok=True)
          with open('data/weather.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          print('Wrote data/weather.json successfully.')
          PYEOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weather.json
          git diff --staged --quiet \
            && echo "No changes." \
            || (git commit -m "chore: update weather data [skip ci]" \
                && git pull --rebase origin main \
                && git push)
