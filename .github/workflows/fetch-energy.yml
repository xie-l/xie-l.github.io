name: Fetch Energy Market Data

on:
  schedule:
    - cron: '5 1 * * *'   # 每天 01:05 UTC（北京时间 09:05）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-energy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: pip install akshare -q

      - name: Fetch energy market data
        env:
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, csv, io, time
          from datetime import datetime, timezone, timedelta

          now_utc = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
          av_key  = os.environ.get('ALPHAVANTAGE_API_KEY', '')

          # ── 辅助函数 ──────────────────────────────────────────────────────
          def fetch_json(url):
              req = urllib.request.Request(url, headers={'User-Agent': 'curl/7.79.1'})
              with urllib.request.urlopen(req, timeout=15) as r:
                  return json.load(r)

          def fetch_text(url):
              req = urllib.request.Request(url, headers={'User-Agent': 'curl/7.79.1'})
              with urllib.request.urlopen(req, timeout=15) as r:
                  return r.read().decode('utf-8')

          # ── 读取现有数据（用于追加 history sparkline） ────────────────────
          old_data = {}
          try:
              with open('data/energy.json', encoding='utf-8') as f:
                  old_data = json.load(f)
          except Exception:
              pass

          def get_old_history(*path):
              obj = old_data
              for p in path:
                  obj = obj.get(p, {}) if isinstance(obj, dict) else {}
              return list(obj.get('history', [])) if isinstance(obj, dict) else []

          def append_history(hist, val):
              if val is None:
                  return hist[-14:]
              try:
                  hist.append(round(float(str(val).replace(',', '')), 4))
              except Exception:
                  pass
              return hist[-14:]

          # ── 1. Alpha Vantage：原油 + 天然气 + 汇率 ───────────────────────
          av_results = {}

          if av_key:
              # 商品序列：WTI、BRENT、NATURAL_GAS（Henry Hub）
              for symbol in ('WTI', 'BRENT', 'NATURAL_GAS'):
                  try:
                      url = (f'https://www.alphavantage.co/query'
                             f'?function={symbol}&interval=daily&apikey={av_key}')
                      data = fetch_json(url)
                      rows = [r for r in data.get('data', []) if r.get('value', '.') != '.']
                      if len(rows) >= 2:
                          price  = float(rows[0]['value'])
                          prev_p = float(rows[1]['value'])
                          chg    = price - prev_p
                          pct    = chg / prev_p * 100
                          key    = symbol.lower()   # 'wti', 'brent', 'natural_gas'
                          if symbol in ('WTI', 'BRENT'):
                              hist = get_old_history('oil', key)
                          else:
                              hist = get_old_history('natgas')
                          hist = append_history(hist, price)
                          av_results[key] = {
                              'price':   f'{price:.2f}',
                              'unit':    'USD/桶' if symbol != 'NATURAL_GAS' else 'USD/MMBtu',
                              'change':  f'{chg:+.2f}',
                              'pct':     f'{pct:+.2f}%',
                              'trend':   'up' if chg >= 0 else 'down',
                              'date':    rows[0]['date'],
                              'history': hist,
                              'updated': now_utc
                          }
                          print(f'[OK] {symbol}: {price:.2f} ({pct:+.2f}%)')
                      else:
                          raise ValueError(f'insufficient rows={len(rows)}')
                  except Exception as e:
                      print(f'[ERR] {symbol}: {e}')
                      key = symbol.lower()
                      if symbol in ('WTI', 'BRENT'):
                          hist = get_old_history('oil', key)
                      else:
                          hist = get_old_history('natgas')
                      av_results[key] = {
                          'price': '--', 'unit': 'USD/桶' if symbol != 'NATURAL_GAS' else 'USD/MMBtu',
                          'change': '--', 'pct': '--', 'trend': 'flat',
                          'date': '', 'history': hist, 'updated': now_utc
                      }
                  time.sleep(13)   # 免费版 5次/分钟限速，间隔 13s

              # 汇率：USD/CNY
              try:
                  url = (f'https://www.alphavantage.co/query?function=FX_DAILY'
                         f'&from_symbol=USD&to_symbol=CNY&outputsize=compact&apikey={av_key}')
                  data = fetch_json(url)
                  ts = data.get('Time Series FX (Daily)', {})
                  if ts:
                      dates = sorted(ts.keys())
                      latest_date = dates[-1]
                      rate      = float(ts[latest_date]['4. close'])
                      prev_rate = float(ts[dates[-2]]['4. close']) if len(dates) >= 2 else rate
                      chg = rate - prev_rate
                      pct = chg / prev_rate * 100
                      hist = get_old_history('usdcny')
                      hist = append_history(hist, rate)
                      av_results['usdcny'] = {
                          'price':   f'{rate:.4f}',
                          'unit':    'CNY/USD',
                          'change':  f'{chg:+.4f}',
                          'pct':     f'{pct:+.2f}%',
                          'trend':   'up' if chg >= 0 else 'down',
                          'date':    latest_date,
                          'history': hist,
                          'updated': now_utc
                      }
                      print(f'[OK] USD/CNY: {rate:.4f} ({pct:+.2f}%)')
                  else:
                      raise ValueError('empty time series')
              except Exception as e:
                  print(f'[ERR] USD/CNY: {e}')
                  av_results['usdcny'] = {
                      'price': '--', 'unit': 'CNY/USD', 'change': '--', 'pct': '--',
                      'trend': 'flat', 'date': '',
                      'history': get_old_history('usdcny'), 'updated': now_utc
                  }
              time.sleep(13)

          else:
              print('[WARN] ALPHAVANTAGE_API_KEY not set, skipping Alpha Vantage data')
              for k, h_path in [('wti', ('oil','wti')), ('brent', ('oil','brent')),
                                 ('natural_gas', ('natgas',)), ('usdcny', ('usdcny',))]:
                  av_results[k] = {
                      'price': '--', 'unit': '--', 'pct': '--', 'trend': 'flat',
                      'date': '', 'history': get_old_history(*h_path), 'updated': now_utc
                  }

          # ── 2. AKShare：CEA + 秦皇岛动力煤 + 中证能源指数 ────────────────
          try:
              import akshare as ak
              AK_OK = True
          except ImportError as e:
              print(f'[ERR] akshare import failed: {e}')
              ak = None
              AK_OK = False

          # 2a. 全国碳市场 CEA
          carbon_result = {}
          if AK_OK:
              try:
                  # 自动枚举 AKShare 中与碳市场相关的函数，打印供调试
                  avail_carbon = sorted(fn for fn in dir(ak)
                                        if any(kw in fn for kw in ('carbon', 'emission', 'Carbon')))
                  print(f'[DEBUG] AKShare carbon functions: {avail_carbon}')

                  df = None
                  # energy_carbon_domestic = 全国碳市场（含各地点），优先尝试
                  for fn in (['energy_carbon_domestic',
                               'carbon_emission_trade_zh',
                               'carbon_trading_emission_trade',
                               'carbon_trading_neeq_spot'] + avail_carbon):
                      if fn in ('carbon_trading_neeq',):
                          continue
                      try:
                          df = getattr(ak, fn)()
                          print(f'[OK] AKShare CEA via {fn}(), rows={len(df)}, cols={list(df.columns)}')
                          break
                      except Exception as fe:
                          print(f'[SKIP] {fn}: {fe}')

                  if df is not None and len(df) > 0:
                      # energy_carbon_domestic 含多个地点，过滤出全国碳市场数据
                      if '地点' in df.columns:
                          for loc in ('全国', '上海', 'SHEA'):
                              sub = df[df['地点'] == loc]
                              if len(sub) > 0:
                                  df = sub
                                  print(f'[OK] Filtered CEA by 地点={loc}, rows={len(df)}')
                                  break

                      # 取最新一行（按日期排序）
                      if '日期' in df.columns:
                          df = df.sort_values('日期')
                      cols = list(df.columns)

                      def find_col(*keywords):
                          for kw in keywords:
                              for c in cols:
                                  if kw in str(c):
                                      return c
                          return None

                      date_col  = find_col('日期', 'date')
                      # 列名可能是"成交价"（energy_carbon_domestic）或"收盘"
                      price_col = find_col('成交价', '收盘', '成交均价', '价格', 'price')
                      chg_col   = find_col('涨跌额', '涨跌')
                      pct_col   = find_col('涨跌幅', 'pct')
                      vol_col   = find_col('成交量', 'volume', 'vol')
                      amt_col   = find_col('成交额', 'amount', 'amt')
                      row       = df.iloc[-1]
                      raw_price = row[price_col] if price_col else None

                      if raw_price is not None and str(raw_price) not in ('--', 'nan', ''):
                          price_val = float(raw_price)
                          chg_val   = float(row[chg_col]) if chg_col and str(row[chg_col]) not in ('--','nan','') else None
                          pct_val   = float(str(row[pct_col]).replace('%','')) if pct_col and str(row[pct_col]) not in ('--','nan','') else None
                          vol_val   = str(row[vol_col]) if vol_col else '--'
                          # 成交额：优先使用，转换为万元显示
                          amt_raw   = row[amt_col] if amt_col else None
                          try:
                              amt_val = f'{float(str(amt_raw).replace(",",""))/1e4:.1f}万元' if amt_raw and str(amt_raw) not in ('--','nan','') else '--'
                          except Exception:
                              amt_val = '--'
                          date_val  = str(row[date_col]).split(' ')[0] if date_col else '--'
                          hist      = get_old_history('carbon', 'cea')
                          hist      = append_history(hist, price_val)
                          carbon_result['cea'] = {
                              'price':      f'{price_val:.2f}',
                              'unit':       '元/吨',
                              'change':     f'{chg_val:+.2f}' if chg_val is not None else '--',
                              'pct':        f'{pct_val:+.2f}%' if pct_val is not None else '--',
                              'trend':      ('up' if (chg_val or 0) >= 0 else 'down') if chg_val is not None else 'flat',
                              'volume':     vol_val,
                              'amount':     amt_val,
                              'date':       date_val,
                              'source':     '全国碳排放权交易市场',
                              'source_url': 'https://www.cneeex.com/',
                              'history':    hist,
                              'updated':    now_utc
                          }
                          print(f'[OK] CEA: {price_val:.2f} 元/吨 成交额={amt_val} ({date_val})')
                      else:
                          raise ValueError(f'No valid price, cols={cols}')
                  else:
                      raise ValueError('AKShare returned empty dataframe')
              except Exception as e:
                  print(f'[ERR] CEA: {e}')
                  carbon_result['cea'] = {
                      'note':       '数据获取中',
                      'unit':       '元/吨',
                      'source':     '全国碳排放权交易市场',
                      'source_url': 'https://www.cneeex.com/',
                      'history':    get_old_history('carbon', 'cea'),
                      'updated':    now_utc
                  }
          else:
              carbon_result['cea'] = {
                  'note': '数据获取中', 'unit': '元/吨',
                  'source': '全国碳排放权交易市场',
                  'source_url': 'https://www.cneeex.com/',
                  'history': get_old_history('carbon', 'cea'), 'updated': now_utc
              }

          # EU ETS 欧盟碳市场（EUA）—— energy_carbon_eu 已确认可用，作为国际碳价基准
          if AK_OK:
              try:
                  df_eu = ak.energy_carbon_eu()
                  if df_eu is not None and len(df_eu) >= 2:
                      cols_eu   = list(df_eu.columns)
                      date_c    = next((c for c in cols_eu if '日期' in str(c) or 'date' in str(c).lower()), None)
                      close_c   = next((c for c in cols_eu if any(k in str(c) for k in ('收盘','close','Close','价格'))), None)
                      pct_c     = next((c for c in cols_eu if '涨跌幅' in str(c)), None)
                      chg_c     = next((c for c in cols_eu if '涨跌额' in str(c)), None)
                      r1 = df_eu.iloc[-1]; r2 = df_eu.iloc[-2]
                      p_eu = float(r1[close_c]) if close_c else None
                      if p_eu:
                          prev_eu = float(r2[close_c]) if close_c else p_eu
                          chg_eu  = float(str(r1[chg_c]).replace(',','')) if chg_c and str(r1[chg_c]) not in ('--','nan','') else (p_eu - prev_eu)
                          pct_eu  = float(str(r1[pct_c]).replace('%','')) if pct_c and str(r1[pct_c]) not in ('--','nan','') else (chg_eu/prev_eu*100 if prev_eu else 0)
                          hist_eu = get_old_history('carbon', 'eua')
                          hist_eu = append_history(hist_eu, p_eu)
                          carbon_result['eua'] = {
                              'price':   f'{p_eu:.2f}',
                              'unit':    '€/吨',
                              'change':  f'{chg_eu:+.2f}',
                              'pct':     f'{pct_eu:+.2f}%',
                              'trend':   'up' if chg_eu >= 0 else 'down',
                              'date':    str(r1[date_c]).split(' ')[0] if date_c else '--',
                              'history': hist_eu,
                              'updated': now_utc
                          }
                          print(f'[OK] EU ETS: {p_eu:.2f} €/吨 ({pct_eu:+.2f}%)')
                      else:
                          raise ValueError(f'no close price, cols={cols_eu}')
                  else:
                      raise ValueError('EU ETS df empty or insufficient rows')
              except Exception as e_eu:
                  print(f'[ERR] EU ETS: {e_eu}')
                  carbon_result.setdefault('eua', {
                      'price': '--', 'unit': '€/吨', 'history': [], 'updated': now_utc
                  })

          # 2b. 煤炭行情——AKShare 无专门煤炭函数，用 DCE 焦煤期货（JM）主力作为煤市代理指标
          coal_result = {}
          if AK_OK:
              try:
                  df = None
                  used_fn = ''
                  # futures_zh_daily_sina: 新浪财经期货历史行情，symbol='JM0' 为焦煤主力
                  for fn, sym in [('futures_zh_daily_sina', 'JM0'),
                                  ('futures_main_sina',     'JM'),
                                  ('futures_zh_realtime',   'JM')]:
                      try:
                          df = getattr(ak, fn)(symbol=sym)
                          if df is not None and len(df) > 0:
                              print(f'[OK] AKShare coal(JM) via {fn}(symbol={sym}), rows={len(df)}, cols={list(df.columns)}')
                              used_fn = fn
                              break
                      except Exception as fe:
                          print(f'[SKIP] {fn}(JM): {fe}')

                  if df is not None and len(df) >= 2:
                      cols      = list(df.columns)
                      date_col  = next((c for c in cols if any(k in str(c) for k in ('日期','date','Date'))), None)
                      close_col = next((c for c in cols if any(k in str(c) for k in ('收盘','close','Close','结算','价格'))), None)
                      # realtime 接口：字段名可能是 '最新价'
                      if not close_col:
                          close_col = next((c for c in cols if any(k in str(c) for k in ('最新','latest','当前'))), None)

                      # 日历史数据取最后一行（最新交易日）
                      df_sorted = df.sort_values(date_col) if date_col else df
                      row1 = df_sorted.iloc[-1]
                      row2 = df_sorted.iloc[-2]
                      raw  = row1[close_col] if close_col else None

                      if raw is not None and str(raw) not in ('--', 'nan', ''):
                          price_val = float(str(raw).replace(',', ''))
                          prev_val  = float(str(row2[close_col]).replace(',', '')) if close_col else price_val
                          chg       = price_val - prev_val
                          pct       = chg / prev_val * 100 if prev_val else 0
                          date_val  = str(row1[date_col]).split(' ')[0] if date_col else '--'
                          hist      = get_old_history('coal_qhd')
                          hist      = append_history(hist, price_val)
                          coal_result = {
                              'price':   f'{price_val:.0f}',
                              'unit':    '元/吨',
                              'change':  f'{chg:+.0f}',
                              'pct':     f'{pct:+.2f}%',
                              'trend':   'up' if chg >= 0 else 'down',
                              'label':   '焦煤期货·DCE主力（JM）',
                              'note':    '动力煤期货已退市，以焦煤期货为煤市参考',
                              'freq':    '日度',
                              'date':    date_val,
                              'history': hist,
                              'updated': now_utc
                          }
                          print(f'[OK] JM(焦煤主力): {price_val:.0f} 元/吨 ({pct:+.2f}%) ({date_val})')
                      else:
                          raise ValueError(f'No close price, cols={cols}')
                  else:
                      raise ValueError('JM futures: insufficient data or all functions failed')
              except Exception as e:
                  print(f'[ERR] coal(JM): {e}')
                  coal_result = {
                      'price': '--', 'unit': '元/吨', 'label': '焦煤期货·DCE主力（JM）',
                      'note': '动力煤期货已退市，以焦煤期货为煤市参考',
                      'date': '', 'history': get_old_history('coal_qhd'), 'updated': now_utc
                  }
          else:
              coal_result = {
                  'price': '--', 'unit': '元/吨', 'label': '焦煤期货·DCE主力（JM）',
                  'date': '', 'history': [], 'updated': now_utc
              }

          # Newcastle 动力煤国际基准（FRED: PCOALAUUSDM，澳大利亚出口价，USD/吨）
          try:
              csv_url_coal = 'https://fred.stlouisfed.org/graph/fredgraph.csv?id=PCOALAUUSDM'
              text_coal    = fetch_text(csv_url_coal)
              reader_coal  = csv.reader(io.StringIO(text_coal))
              coal_rows    = [r for r in reader_coal
                              if len(r) == 2 and r[0] != 'DATE' and r[1] not in ('.', 'PCOALAUUSDM')]
              if len(coal_rows) >= 2:
                  latest_coal = coal_rows[-1]
                  prev_coal   = coal_rows[-2]
                  p_coal   = float(latest_coal[1])
                  p_prev_c = float(prev_coal[1])
                  chg_coal = p_coal - p_prev_c
                  pct_coal = chg_coal / p_prev_c * 100 if p_prev_c else 0
                  hist_coal = get_old_history('coal_qhd', 'newcastle')
                  hist_coal = append_history(hist_coal, p_coal)
                  coal_result['newcastle'] = {
                      'price':   f'{p_coal:.2f}',
                      'unit':    'USD/吨',
                      'change':  f'{chg_coal:+.2f}',
                      'pct':     f'{pct_coal:+.2f}%',
                      'trend':   'up' if chg_coal >= 0 else 'down',
                      'date':    latest_coal[0],
                      'label':   'Newcastle动力煤（FRED月度）',
                      'source':  'FRED / World Bank',
                      'history': hist_coal,
                      'updated': now_utc
                  }
                  print(f'[OK] Newcastle coal: {p_coal:.2f} USD/吨 ({pct_coal:+.2f}%) ({latest_coal[0]})')
              else:
                  raise ValueError('Insufficient coal rows')
          except Exception as e_coal:
              print(f'[ERR] Newcastle coal: {e_coal}')
              coal_result.setdefault('newcastle', {
                  'price': '--', 'unit': 'USD/吨', 'history': [], 'updated': now_utc
              })

          # 2c. 中证能源指数（399932）——主力：新浪财经实时行情 API
          import re as _re
          index_result = {}
          try:
              idx_req = urllib.request.Request(
                  'https://hq.sinajs.cn/list=sz399932',
                  headers={
                      'Referer':    'https://finance.sina.com.cn/',
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)'
                  }
              )
              with urllib.request.urlopen(idx_req, timeout=10) as r:
                  idx_text = r.read().decode('gbk')
              m = _re.search(r'"([^"]+)"', idx_text)
              if not m or not m.group(1).strip():
                  raise ValueError('Empty Sina response (market may be closed)')
              vals = m.group(1).split(',')
              # 字段：名称,开盘,昨收,当前,最高,最低,买,卖,成交量(手),成交额(元),日期,时间,...
              if len(vals) < 11:
                  raise ValueError(f'Field count too low: {len(vals)}: {vals}')
              current = float(vals[3])
              prev_cl = float(vals[2])
              high    = float(vals[4])
              low     = float(vals[5])
              amount  = float(vals[9])       # 元
              date_str = vals[10].strip()    # YYYY-MM-DD
              chg  = current - prev_cl
              pct  = chg / prev_cl * 100
              hist = get_old_history('energy_index')
              hist = append_history(hist, current)
              index_result = {
                  'name':    '中证能源',
                  'code':    '399932',
                  'price':   f'{current:.2f}',
                  'change':  f'{chg:+.2f}',
                  'pct':     f'{pct:+.2f}%',
                  'trend':   'up' if chg >= 0 else 'down',
                  'high':    f'{high:.2f}',
                  'low':     f'{low:.2f}',
                  'amount':  f'{amount/1e8:.2f}',   # 亿元
                  'date':    date_str,
                  'history': hist,
                  'updated': now_utc
              }
              print(f'[OK] 中证能源(Sina): {current:.2f} ({pct:+.2f}%) 成交额={amount/1e8:.2f}亿')
          except Exception as sina_err:
              print(f'[WARN] Sina index failed: {sina_err}, trying AKShare fallback')
              # 降级：AKShare
              _ak_idx_ok = False
              if AK_OK:
                  try:
                      today_str = datetime.now().strftime('%Y%m%d')
                      last30    = (datetime.now() - timedelta(days=30)).strftime('%Y%m%d')
                      df = None
                      for fn, kwargs in [
                          ('stock_zh_index_daily_em', {'symbol': 'sz399932'}),
                          ('index_zh_a_hist',         {'symbol': '399932', 'period': 'daily',
                                                       'start_date': last30, 'end_date': today_str}),
                      ]:
                          try:
                              df = getattr(ak, fn)(**kwargs)
                              print(f'[OK] AKShare index fallback via {fn}(), rows={len(df)}')
                              break
                          except Exception as fe:
                              print(f'[SKIP] {fn}: {fe}')

                      if df is not None and len(df) >= 2:
                          cols      = list(df.columns)
                          date_col  = next((c for c in cols if '日期' in str(c) or 'date' in str(c).lower()), None)
                          close_col = next((c for c in cols if '收盘' in str(c) or 'close' in str(c).lower()), None)
                          pct_col   = next((c for c in cols if '涨跌幅' in str(c)), None)
                          row1 = df.iloc[-1]; row2 = df.iloc[-2]
                          price_val = float(row1[close_col]) if close_col else None
                          prev_val  = float(row2[close_col]) if close_col else None
                          if price_val:
                              chg   = price_val - prev_val if prev_val else 0
                              pct_v = float(str(row1[pct_col]).replace('%','')) if pct_col and str(row1[pct_col]) not in ('--','nan','') else (chg/prev_val*100 if prev_val else 0)
                              hist  = get_old_history('energy_index')
                              hist  = append_history(hist, price_val)
                              index_result = {
                                  'name': '中证能源', 'code': '399932',
                                  'price': f'{price_val:.2f}', 'change': f'{chg:+.2f}',
                                  'pct': f'{pct_v:+.2f}%', 'trend': 'up' if chg >= 0 else 'down',
                                  'date': str(row1[date_col]).split(' ')[0] if date_col else '--',
                                  'history': hist, 'updated': now_utc
                              }
                              _ak_idx_ok = True
                              print(f'[OK] 中证能源(AKShare): {price_val:.2f} ({pct_v:+.2f}%)')
                  except Exception as e2:
                      print(f'[ERR] 中证能源 AKShare: {e2}')
              if not _ak_idx_ok:
                  index_result = {
                      'name': '中证能源', 'code': '399932',
                      'price': '--', 'pct': '--', 'trend': 'flat', 'date': '',
                      'history': get_old_history('energy_index'), 'updated': now_utc
                  }

          # ── 3. FRED：美国工业气体 PPI ─────────────────────────────────────
          hydrogen_result = {}
          try:
              csv_url = 'https://fred.stlouisfed.org/graph/fredgraph.csv?id=PCU325120325120'
              text    = fetch_text(csv_url)
              reader  = csv.reader(io.StringIO(text))
              data_rows = [r for r in reader
                           if len(r) == 2 and r[0] != 'DATE' and r[1] not in ('.', 'PCU325120325120')]
              if data_rows:
                  latest = data_rows[-1]
                  hist   = get_old_history('hydrogen', 'us_ppi')
                  hist   = append_history(hist, latest[1])
                  hydrogen_result['us_ppi'] = {
                      'index':   latest[1],
                      'period':  latest[0][:7],
                      'desc':    '美国工业气体（含氢）PPI',
                      'base':    '2012=100',
                      'source':  'FRED / 美联储',
                      'history': hist,
                      'updated': now_utc
                  }
                  print(f'[OK] FRED PPI: {latest[1]} ({latest[0]})')
              else:
                  raise ValueError('No valid rows')
          except Exception as e:
              print(f'[ERR] FRED PPI: {e}')
              hydrogen_result['us_ppi'] = {
                  'index': '--', 'period': '--',
                  'desc': '美国工业气体（含氢）PPI', 'base': '2012=100',
                  'source': 'FRED / 美联储',
                  'history': get_old_history('hydrogen', 'us_ppi'),
                  'updated': now_utc
              }

          # ── 写入 JSON ─────────────────────────────────────────────────────
          result = {
              'oil': {
                  'wti':   av_results.get('wti', {}),
                  'brent': av_results.get('brent', {})
              },
              'natgas':       av_results.get('natural_gas', {}),
              'usdcny':       av_results.get('usdcny', {}),
              'coal_qhd':     coal_result,
              'energy_index': index_result,
              'carbon':       carbon_result,
              'hydrogen':     hydrogen_result,
              'updated':      now_utc
          }
          os.makedirs('data', exist_ok=True)
          with open('data/energy.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          print('Wrote data/energy.json successfully.')
          PYEOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/energy.json
          git diff --staged --quiet \
            && echo "No changes to commit." \
            || (git commit -m "chore: update energy market data [skip ci]" \
                && git pull --rebase origin main \
                && git push)
