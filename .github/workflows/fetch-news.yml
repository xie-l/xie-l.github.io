name: Fetch News Feeds

on:
  schedule:
    - cron: '0 22,2,7,14 * * *'   # 北京时间 6:00 / 10:00 / 15:00 / 22:00
  workflow_dispatch:                # 可在 GitHub Actions 页面手动触发

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install feedparser
        run: pip install feedparser

      - name: Fetch RSS feeds
        run: |
          python3 << 'PYEOF'
          import feedparser, json, re, os
          from datetime import datetime, timezone

          FEEDS = {
              'tech': {
                  'url': 'https://feeds.nature.com/nature/rss/current',
                  'source': 'Nature',
                  'count': 8
              },
              'energy': {
                  'url': 'https://feeds.nature.com/nenergy/rss/current',
                  'source': 'Nature Energy',
                  'count': 8
              },
              'hydrogen': {
                  'url': 'https://fuelcellsworks.com/feed/',
                  'source': 'Fuel Cells Works',
                  'count': 8
              },
              'papers': {
                  # arXiv API：搜索电催化/氢能/电解相关最新论文
                  'url': 'https://export.arxiv.org/api/query?search_query=ti:electrocatalysis+OR+ti:hydrogen+evolution+OR+ti:electrolyzer+OR+ti:oxygen+reduction&start=0&max_results=10&sortBy=submittedDate&sortOrder=descending',
                  'source': 'arXiv',
                  'count': 10
              }
          }

          def clean(text):
              text = re.sub(r'<[^>]+>', ' ', text or '')
              text = re.sub(r'\s+', ' ', text).strip()
              return text[:250]

          result = {}
          now_utc = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')

          for key, cfg in FEEDS.items():
              items = []
              try:
                  d = feedparser.parse(cfg['url'])
                  entries = d.get('entries', [])
                  for entry in entries[:cfg['count']]:
                      title = clean(entry.get('title', ''))
                      link  = (entry.get('link') or '').strip()
                      date  = (entry.get('published') or entry.get('updated') or '').strip()
                      desc  = clean(entry.get('summary') or entry.get('description') or '')
                      if title and link:
                          items.append({
                              'title': title,
                              'link':  link,
                              'pubDate': date,
                              'description': desc
                          })
                  print(f'[OK] {key}: {len(items)} items from {cfg["source"]}')
              except Exception as e:
                  print(f'[ERR] {key}: {e}')

              result[key] = {
                  'items':   items,
                  'source':  cfg['source'],
                  'updated': now_utc
              }

          os.makedirs('data', exist_ok=True)
          with open('data/news.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          print('Wrote data/news.json successfully.')
          PYEOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git diff --staged --quiet \
            && echo "No changes to commit." \
            || (git commit -m "chore: update news feeds $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]" \
                && git push)
