name: Fetch News Feeds

on:
  schedule:
    - cron: '0 22,2,7,14 * * *'   # 北京时间 6:00 / 10:00 / 15:00 / 22:00
  workflow_dispatch:                # 可在 GitHub Actions 页面手动触发

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install feedparser
        run: pip install feedparser

      - name: Fetch RSS feeds and translate
        run: |
          python3 << 'PYEOF'
          import feedparser, json, re, os, time
          import urllib.request, urllib.parse
          from datetime import datetime, timezone

          # ── 需要翻译（英文源）的 feed key ──────────────────────────────────
          ENGLISH_FEEDS = {'tech', 'energy_intl', 'energy', 'hydrogen', 'papers'}

          FEEDS = {
              'tech': {
                  'url': 'https://feeds.nature.com/nature/rss/current',
                  'source': 'Nature', 'count': 8
              },
              'tech_cn': {
                  'url': 'https://36kr.com/feed',
                  'source': '36氪', 'count': 8
              },
              'energy_intl': {
                  # CleanTechnica：国际清洁能源&新能源资讯（RSS稳定）
                  'url': 'https://cleantechnica.com/feed/',
                  'source': 'CleanTechnica', 'count': 8
              },
              'energy': {
                  'url': 'https://feeds.nature.com/nenergy/rss/current',
                  'source': 'Nature Energy', 'count': 8
              },
              'energy_cn': {
                  # Google News RSS（中文能源关键词搜索）：聚合国内各媒体能源报道
                  'url': 'https://news.google.com/rss/search?q=%E8%83%BD%E6%BA%90+%E7%94%B5%E5%8A%9B+%E6%B0%A2%E8%83%BD&hl=zh-CN&gl=CN&ceid=CN:zh-Hans',
                  'source': 'Google新闻·能源', 'count': 8
              },
              'hydrogen': {
                  'url': 'https://fuelcellsworks.com/feed/',
                  'source': 'Fuel Cells Works', 'count': 8
              },
              'papers': {
                  'url': ('https://export.arxiv.org/api/query'
                          '?search_query=ti:electrocatalysis+OR+ti:hydrogen+evolution'
                          '+OR+ti:electrolyzer+OR+ti:oxygen+reduction'
                          '&start=0&max_results=10&sortBy=submittedDate&sortOrder=descending'),
                  'source': 'arXiv', 'count': 10
              },
              'policy_nea': {
                  # 国家能源局相关政策（Google新闻RSS，中文）
                  'url': 'https://news.google.com/rss/search?q=%E5%9B%BD%E5%AE%B6%E8%83%BD%E6%BA%90%E5%B1%80+%E6%B0%A2%E8%83%BD+%E6%94%BF%E7%AD%96&hl=zh-CN&gl=CN&ceid=CN:zh-Hans',
                  'source': '国家能源局', 'count': 8
              },
              'policy_ndrc': {
                  # 发改委能源政策（Google新闻RSS，中文）
                  'url': 'https://news.google.com/rss/search?q=%E5%8F%91%E6%94%B9%E5%A7%94+%E8%83%BD%E6%BA%90%E6%94%BF%E7%AD%96+%E7%BB%BF%E8%89%B2&hl=zh-CN&gl=CN&ceid=CN:zh-Hans',
                  'source': '发改委政策', 'count': 8
              }
          }

          def clean(text):
              text = re.sub(r'<[^>]+>', ' ', text or '')
              text = re.sub(r'\s+', ' ', text).strip()
              return text[:300]

          # ── MyMemory 免费翻译（英→中），无需 API Key ───────────────────────
          _trans_cache = {}

          def translate_to_zh(text, max_chars=200):
              """把英文文本翻译为中文，失败返回空字符串"""
              if not text or len(text.strip()) < 5:
                  return ''
              text = text[:max_chars].strip()
              if text in _trans_cache:
                  return _trans_cache[text]
              try:
                  url = ('https://api.mymemory.translated.net/get?q='
                         + urllib.parse.quote(text) + '&langpair=en|zh-CN')
                  req = urllib.request.Request(
                      url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=8) as r:
                      data = json.load(r)
                  translated = (data.get('responseData') or {}).get('translatedText', '')
                  # MyMemory 有时原样返回（翻译失败），过滤掉
                  if translated and translated.lower().strip() != text.lower().strip():
                      _trans_cache[text] = translated
                      return translated
              except Exception as e:
                  print(f'  [translate warn] {e}')
              _trans_cache[text] = ''
              return ''

          # ── 主循环 ────────────────────────────────────────────────────────
          result = {}
          now_utc = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')

          for key, cfg in FEEDS.items():
              items = []
              needs_trans = key in ENGLISH_FEEDS
              try:
                  d = feedparser.parse(cfg['url'])
                  entries = d.get('entries', [])
                  for entry in entries[:cfg['count']]:
                      title = clean(entry.get('title', ''))
                      link  = (entry.get('link') or '').strip()
                      date  = (entry.get('published') or entry.get('updated') or '').strip()
                      desc  = clean(entry.get('summary') or entry.get('description') or '')
                      if not (title and link):
                          continue
                      item = {'title': title, 'link': link, 'pubDate': date, 'description': desc}
                      if needs_trans:
                          item['title_cn'] = translate_to_zh(title, 180)
                          time.sleep(0.4)   # 避免触发速率限制
                      items.append(item)
                  print(f'[OK] {key}: {len(items)} items, translate={needs_trans}')
              except Exception as e:
                  print(f'[ERR] {key}: {e}')

              result[key] = {
                  'items':   items,
                  'source':  cfg['source'],
                  'updated': now_utc
              }

          os.makedirs('data', exist_ok=True)
          with open('data/news.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          print('Wrote data/news.json successfully.')
          PYEOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git diff --staged --quiet \
            && echo "No changes to commit." \
            || (git commit -m "chore: update news feeds $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]" \
                && git pull --rebase origin main \
                && git push)
