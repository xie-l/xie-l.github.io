<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信读书显示测试</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .success { border-color: #10b981; background: #f0fdf4; }
        .error { border-color: #ef4444; background: #fef2f2; }
        .sidebar-widget { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 280px; }
        .widget-title { font-size: 16px; font-weight: 600; margin: 0 0 12px 0; color: #1e3a5f; }
        .wr-current { display: flex; gap: 12px; margin-bottom: 12px; }
        .wr-cover { width: 48px; height: 64px; object-fit: cover; border-radius: 4px; }
        .wr-cover-placeholder { width: 48px; height: 64px; background: #f3f4f6; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .wr-info { flex: 1; min-width: 0; }
        .wr-book-title { font-size: 14px; font-weight: 600; color: #1e293b; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .wr-author { font-size: 12px; color: #64748b; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .wr-bar-wrap { height: 4px; background: #e2e8f0; border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
        .wr-bar { height: 100%; background: #2e86de; transition: width 0.3s; }
        .wr-pct { font-size: 11px; color: #64748b; text-align: right; }
        .wr-recent-title { font-size: 13px; font-weight: 600; color: #1e3a5f; margin: 12px 0 8px 0; }
        .wr-recent-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 12px; border-bottom: 1px solid #f1f5f9; }
        .wr-rt { color: #10b981; font-weight: 600; }
        pre { background: #f8fafc; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 12px; }
    </style>
</head>
<body>
    <h1>微信读书显示功能测试</h1>
    
    <div class="test-section">
        <h2>测试1: 检查DOM结构</h2>
        <div id="test1-result"></div>
    </div>

    <div class="test-section">
        <h2>测试2: 加载测试数据并显示</h2>
        <button onclick="loadTestData()">加载测试数据</button>
        <div id="test2-result"></div>
        <div id="weread-widget" style="display:none">
            <h3 class="widget-title">📚 正在阅读</h3>
            <div id="weread-content">
                <div class="wr-current">
                    <div class="wr-cover-placeholder">📖</div>
                    <div class="wr-info">
                        <div class="wr-book-title" id="wr-title">--</div>
                        <div class="wr-author" id="wr-author">--</div>
                        <div class="wr-bar-wrap">
                            <div class="wr-bar" id="wr-bar" style="width:0%"></div>
                        </div>
                        <div class="wr-pct" id="wr-pct">0%</div>
                    </div>
                </div>
                <div class="wr-recent-title">最近读过</div>
                <div id="wr-recent-list"></div>
                <div id="wr-updated" style="font-size:11px;color:var(--text-light);margin-top:8px;opacity:.65;"></div>
            </div>
        </div>
    </div>

    <div class="test-section">
        <h2>测试3: 实际数据加载</h2>
        <button onclick="loadRealData()">加载实际数据 (data/weread.json)</button>
        <div id="test3-result"></div>
    </div>

    <script>
        function setResult(testId, success, message) {
            const resultEl = document.getElementById(testId);
            resultEl.innerHTML = `<div class="${success ? 'success' : 'error'}"><strong>${success ? '✓ 通过' : '✗ 失败'}</strong>: ${message}</div>`;
        }

        // 测试1: DOM结构检查
        function testDOM() {
            const widget = document.getElementById('weread-widget');
            const content = document.getElementById('weread-content');
            const title = document.getElementById('wr-title');
            
            if (!widget || !content || !title) {
                setResult('test1-result', false, 'DOM结构不完整，缺少必要的元素');
                return false;
            }
            setResult('test1-result', true, 'DOM结构完整，所有必要元素都存在');
            return true;
        }

        // 测试2: 加载测试数据
        async function loadTestData() {
            const resultEl = document.getElementById('test2-result');
            try {
                const res = await fetch('data/weread-test.json');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                
                displayWeReadData(data);
                
                const widget = document.getElementById('weread-widget');
                if (widget.style.display === 'none') {
                    setResult('test2-result', false, '数据加载成功，但widget未显示（display仍为none）');
                } else {
                    setResult('test2-result', true, '数据加载成功，widget正确显示');
                }
            } catch (e) {
                setResult('test2-result', false, '加载失败: ' + e.message);
            }
        }

        // 测试3: 加载实际数据
        async function loadRealData() {
            const resultEl = document.getElementById('test3-result');
            try {
                const res = await fetch('/data/weread.json?_=' + Date.now());
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                
                resultEl.innerHTML = '<pre>实际数据:\n' + JSON.stringify(data, null, 2) + '</pre>';
                
                if (!data.reading && (!data.recent || data.recent.length === 0)) {
                    setResult('test3-result', false, '数据文件存在，但没有有效数据（reading为null且recent为空）');
                } else {
                    displayWeReadData(data);
                    setResult('test3-result', true, '数据加载成功，widget已显示');
                }
            } catch (e) {
                setResult('test3-result', false, '加载失败: ' + e.message);
            }
        }

        // 显示微信读书数据（复制自index.html的逻辑）
        function displayWeReadData(d) {
            const widget = document.getElementById('weread-widget');
            if (!widget) return;
            if (!d.reading && (!d.recent || d.recent.length === 0)) return;
            
            widget.style.display = '';
            
            if (d.reading) {
                const r = d.reading;
                const titleEl = document.getElementById('wr-title');
                const authorEl = document.getElementById('wr-author');
                const barEl = document.getElementById('wr-bar');
                const pctEl = document.getElementById('wr-pct');
                
                if (titleEl) titleEl.textContent = r.title || '--';
                if (authorEl) authorEl.textContent = r.author || '';
                const pct = Math.min(100, Math.max(0, r.progress || 0));
                if (barEl) barEl.style.width = pct + '%';
                if (pctEl) pctEl.textContent = '已读 ' + pct + '%';
                
                if (r.cover) {
                    const placeholder = widget.querySelector('.wr-cover-placeholder');
                    if (placeholder) {
                        const img = document.createElement('img');
                        img.className = 'wr-cover';
                        img.src = r.cover;
                        img.alt = r.title;
                        img.onerror = () => {};
                        placeholder.replaceWith(img);
                    }
                }
            }
            
            if (d.recent && d.recent.length > 0) {
                const listEl = document.getElementById('wr-recent-list');
                if (listEl) {
                    listEl.innerHTML = d.recent.slice(0, 4).map(function(b) {
                        const finishMark = b.finished ? '✓' : (b.progress ? b.progress + '%' : '');
                        return '<div class="wr-recent-item">' +
                            '<span style="overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:130px">' + (b.title || '') + '</span>' +
                            '<span class="wr-rt">' + finishMark + '</span></div>';
                    }).join('');
                }
            }
        }

        // 页面加载时运行DOM测试
        window.onload = function() {
            testDOM();
        };
    </script>
</body>
</html>
