<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日小结（2026.04.04-05） - 谢亮的生活日记</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .blog-container {
            max-width: 900px;
            margin: 100px auto 50px;
            padding: 0 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--secondary-color);
            text-decoration: none;
            transition: var(--transition);
        }
        .back-link:hover { color: var(--primary-color); }
        .post-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
        }
        .post-title {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .post-meta {
            color: var(--text-light);
            font-size: 14px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .post-content {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 40px;
            box-shadow: var(--shadow-md);
            line-height: 1.8;
            font-size: 16px;
        }
        .post-content h2 {
            color: var(--primary-color);
            margin-top: 40px;
            margin-bottom: 20px;
            font-size: 22px;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 8px;
        }
        .post-content h3 {
            color: var(--primary-color);
            margin-top: 28px;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .post-content p { margin-bottom: 18px; text-align: justify; }
        .post-content ul, .post-content ol { margin-left: 25px; margin-bottom: 18px; }
        .post-content li { margin-bottom: 10px; line-height: 1.7; }
        .post-content strong { color: var(--primary-color); font-weight: 600; }
        .post-content blockquote {
            border-left: 4px solid var(--secondary-color);
            background: rgba(6, 182, 212, 0.06);
            padding: 16px 20px;
            margin: 24px 0;
            border-radius: 0 8px 8px 0;
            font-style: italic;
            color: var(--text-light);
        }
        .post-content code {
            background: rgba(6, 182, 212, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
        }
        .post-content pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
            margin-bottom: 20px;
        }
        .post-content pre code { background: none; padding: 0; color: inherit; }
        .post-tags {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .tag {
            font-size: 13px;
            background: var(--secondary-color);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
        }
        @media (max-width: 768px) {
            .blog-container { margin-top: 80px; }
            .post-content { padding: 20px; }
            .post-title { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="blog-container">
        <a href="./" class="back-link">
            <i class="fas fa-arrow-left"></i> 返回生活日记
        </a>

        <article class="post-header">
            <h1 class="post-title">今日小结（2026.04.04-05）</h1>
            <div class="post-meta">
                <span><i class="fas fa-calendar"></i> 2026年04月05日</span>
                <span><i class="fas fa-clock"></i> 阅读时长：约3分钟</span>
                <span><i class="fas fa-tag"></i> 日小结；记录</span>
            </div>
        </article>

        <div class="post-content">
            <p>1.完善优化个人 GitHub 主页；
2.整理清洁房间衣服物品。</p>

        </div>

        <div class="post-tags">
            <span class="tag">日小结；记录</span>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 谢亮. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
