<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日小结（2026.04.04-05） - 谢亮</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✏️</text></svg>">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .blog-container{max-width:800px;margin:100px auto 50px;padding:0 20px}
        .back-link{display:inline-block;margin-bottom:20px;color:var(--secondary-color);text-decoration:none}
        .post-header{text-align:center;margin-bottom:40px;padding-bottom:30px;border-bottom:1px solid var(--border-color)}
        .post-title{font-size:26px;color:var(--primary-color);margin-bottom:15px;line-height:1.4}
        .post-meta{color:var(--text-light);font-size:14px;display:flex;justify-content:center;gap:20px;flex-wrap:wrap}
        .post-content{background:var(--card-bg,#fff);border-radius:15px;padding:40px;box-shadow:var(--shadow-md);line-height:1.9;font-size:16px}
        .post-content p{margin-bottom:18px;text-align:justify}
        .post-tags{margin-top:30px;padding-top:20px;border-top:1px solid var(--border-color);display:flex;gap:8px}
        .tag{font-size:12px;background:var(--secondary-color);color:#fff;padding:4px 12px;border-radius:20px}
    </style>
</head>
<body>
    <div class="blog-container">
        <a href="./" class="back-link"><i class="fas fa-arrow-left"></i> 返回</a>
        <article class="post-header">
            <h1 class="post-title">今日小结（2026.04.04-05）</h1>
            <div class="post-meta">
                <span><i class="fas fa-calendar"></i> 2026年4月5日</span>
                <span><i class="fas fa-tag"></i> 日记</span>
            </div>
        </article>
        <div class="post-content">
            <p>1.整理优化个人网页；</p>
            <p>2.整理打扫房间。</p>
            <div class="post-tags"><span class="tag">日记</span></div>
        </div>
    </div>

<script>
/* 标签点击跳转到标签聚合页 */
document.querySelectorAll('.tag').forEach(function(el){
    el.style.cursor='pointer';
    el.addEventListener('click',function(e){
        e.preventDefault(); e.stopPropagation();
        location.href='../tags.html?tag='+encodeURIComponent(el.textContent.trim());
    });
});
</script>
</body>
</html>
