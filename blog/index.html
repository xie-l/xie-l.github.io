<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人日记 - 谢亮</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .blog-container {
            max-width: 1200px;
            margin: 100px auto 50px;
            padding: 0 20px;
        }
        .blog-header {
            text-align: center;
            margin-bottom: 50px;
        }
        .blog-header h1 {
            font-size: 36px;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        .blog-header p {
            color: var(--text-light);
            font-size: 18px;
        }
        .blog-categories {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .category-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            text-decoration: none;
            color: var(--text-color);
            text-align: center;
            min-width: 200px;
        }
        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }
        .category-card i {
            font-size: 48px;
            color: var(--secondary-color);
            margin-bottom: 15px;
        }
        .category-card h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }
        .category-card p {
            color: var(--text-light);
            font-size: 14px;
        }
        .recent-posts {
            margin-top: 50px;
        }
        .recent-posts h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary-color);
        }
        .post-item {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
        }
        .post-item:hover {
            box-shadow: var(--shadow-hover);
            transform: translateX(8px);
        }
        .post-date {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 5px;
        }
        .post-title {
            font-size: 18px;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        .post-excerpt {
            color: var(--text-color);
            font-size: 14px;
            line-height: 1.6;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--secondary-color);
            text-decoration: none;
            transition: var(--transition);
        }
        .back-link:hover {
            color: var(--primary-color);
        }
        .back-link i {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> 返回主页
    </a>

    <div class="blog-container">
        <div class="blog-header">
            <h1>个人日记与思考</h1>
            <p>记录技术成长与生活感悟</p>
        </div>

        <div class="blog-categories">
            <a href="tech/" class="category-card">
                <i class="fas fa-code"></i>
                <h3>技术思考</h3>
                <p>编程心得、技术探索、项目总结</p>
            </a>
            <a href="life/" class="category-card">
                <i class="fas fa-book"></i>
                <h3>生活日记</h3>
                <p>日常生活、读书感悟、成长记录</p>
            </a>
            <a href="books/" class="category-card">
                <i class="fas fa-book-open"></i>
                <h3>书籍阅读</h3>
                <p>读书心得、书评分享、知识总结</p>
            </a>
            <a href="analysis/" class="category-card">
                <i class="fas fa-chart-line"></i>
                <h3>数据分析</h3>
                <p>数据分析案例、可视化技巧</p>
            </a>
        </div>

        <div class="recent-posts">
            <h2>最新文章</h2>
            <div class="post-item">
                <div class="post-date">2026-04-03</div>
                <h3 class="post-title">欢迎来到我的个人日记</h3>
                <p class="post-excerpt">
                    这是我的个人日记和思考空间。在这里，我会记录技术学习的心得体会、项目开发的经验总结，以及生活中的点滴感悟...
                </p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 谢亮. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
