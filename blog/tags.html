<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签搜索 - 谢亮的博客</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏷️</text></svg>">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .blog-container { max-width: 900px; margin: 100px auto 50px; padding: 0 20px; }
        .back-link { display:inline-block; margin-bottom:20px; color:var(--secondary-color); text-decoration:none; transition:var(--transition); }
        .back-link:hover { color:var(--primary-color); }
        .tag-header { margin-bottom:32px; }
        .tag-header h1 { font-size:26px; color:var(--primary-color); display:flex; align-items:center; gap:10px; }
        .tag-badge {
            display:inline-block; background:var(--secondary-color); color:#fff;
            padding:4px 16px; border-radius:20px; font-size:16px; font-weight:600;
        }
        .tag-header p { color:var(--text-light); font-size:14px; margin-top:8px; }
        .post-list { display:flex; flex-direction:column; gap:16px; }
        .post-item {
            background:var(--card-bg); border-radius:10px; padding:22px 26px;
            box-shadow:var(--shadow); transition:var(--transition);
            text-decoration:none; color:var(--text-color); display:block;
        }
        .post-item:hover { transform:translateY(-3px); box-shadow:var(--shadow-hover); }
        .post-meta { font-size:12px; color:var(--text-light); margin-bottom:6px; display:flex; gap:14px; flex-wrap:wrap; }
        .post-title { font-size:18px; color:var(--primary-color); margin-bottom:8px; font-weight:600; line-height:1.4; }
        .post-excerpt { color:var(--text-color); font-size:14px; line-height:1.6; margin-bottom:10px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .post-tags { display:flex; gap:7px; flex-wrap:wrap; }
        .post-tags .tag {
            font-size:12px; background:var(--secondary-color); color:#fff;
            padding:3px 10px; border-radius:15px; text-decoration:none;
            transition:background .2s;
        }
        .post-tags .tag:hover { background:var(--primary-color); }
        .post-tags .tag.active { background:var(--primary-color); outline:2px solid var(--secondary-color); }
        .cat-label {
            font-size:11px; background:rgba(52,152,219,.12); color:var(--secondary-color);
            border:1px solid rgba(52,152,219,.25); padding:2px 9px; border-radius:10px;
        }
        .empty-box { text-align:center; padding:50px 20px; color:var(--text-light); font-size:15px; }
        .loading-box { text-align:center; padding:40px; color:var(--text-light); font-size:14px; }
    </style>
</head>
<body>
    <div class="blog-container">
        <a href="./" class="back-link"><i class="fas fa-arrow-left"></i> 返回博客</a>
        <div class="tag-header">
            <h1><i class="fas fa-tag"></i> 标签：<span class="tag-badge" id="tag-name">...</span></h1>
            <p id="tag-summary">正在加载...</p>
        </div>
        <div id="post-container">
            <div class="loading-box"><i class="fas fa-spinner fa-spin"></i> 搜索中...</div>
        </div>
    </div>
    <script>
    (function(){
        const currentTag = decodeURIComponent(new URLSearchParams(location.search).get('tag') || '');
        document.title = '标签：' + currentTag + ' - 谢亮的博客';
        document.getElementById('tag-name').textContent = currentTag || '（未指定）';

        const CATS = [
            { key:'books',    name:'书籍阅读',   dir:'books/'    },
            { key:'life',     name:'生活日记',   dir:'life/'     },
            { key:'tech',     name:'技术思考',   dir:'tech/'     },
            { key:'analysis', name:'数据分析',   dir:'analysis/' },
        ];

        function makeTagLink(tagText, isCurrent) {
            const a = document.createElement('a');
            a.className = 'tag' + (tagText === currentTag ? ' active' : '');
            a.href = '../tags.html?tag=' + encodeURIComponent(tagText);
            a.textContent = tagText;
            return a.outerHTML;
        }

        async function fetchCategory(cat) {
            const res = await fetch(cat.dir + 'index.html');
            if (!res.ok) return [];
            const html = await res.text();
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const items = [];
            doc.querySelectorAll('a.post-item').forEach(function(el) {
                const tags = Array.from(el.querySelectorAll('.tag')).map(t => t.textContent.trim());
                if (!tags.some(t => t === currentTag)) return;
                const href = cat.dir + el.getAttribute('href');
                const title = el.querySelector('.post-title')?.textContent?.trim() || '';
                const date  = el.querySelector('.post-date')?.textContent?.trim()  || '';
                const excerpt = el.querySelector('.post-excerpt')?.textContent?.trim().replace(/\s+/g,' ') || '';
                if (title) items.push({ href, title, date, excerpt, tags, catName: cat.name });
            });
            return items;
        }

        async function run() {
            if (!currentTag) {
                document.getElementById('post-container').innerHTML =
                    '<div class="empty-box">未指定标签</div>';
                document.getElementById('tag-summary').textContent = '';
                return;
            }
            try {
                const all = (await Promise.all(CATS.map(fetchCategory))).flat();
                // 按日期降序
                all.sort((a,b) => (b.date > a.date ? 1 : -1));
                document.getElementById('tag-summary').textContent =
                    '找到 ' + all.length + ' 篇相关文章';
                if (all.length === 0) {
                    document.getElementById('post-container').innerHTML =
                        '<div class="empty-box"><i class="fas fa-search"></i><br>暂无含有此标签的文章</div>';
                    return;
                }
                const html = all.map(function(p) {
                    const tagHtml = p.tags.map(t => makeTagLink(t)).join('');
                    return '<a href="' + p.href + '" class="post-item">' +
                        '<div class="post-meta">' +
                        '<span><i class="fas fa-calendar-alt" style="margin-right:4px;opacity:.6"></i>' + p.date + '</span>' +
                        '<span class="cat-label">' + p.catName + '</span>' +
                        '</div>' +
                        '<div class="post-title">' + p.title + '</div>' +
                        (p.excerpt ? '<div class="post-excerpt">' + p.excerpt + '</div>' : '') +
                        '<div class="post-tags">' + tagHtml + '</div>' +
                        '</a>';
                }).join('');
                document.getElementById('post-container').innerHTML =
                    '<div class="post-list">' + html + '</div>';
            } catch(e) {
                document.getElementById('post-container').innerHTML =
                    '<div class="empty-box"><i class="fas fa-exclamation-circle"></i> 加载失败，请刷新重试</div>';
                document.getElementById('tag-summary').textContent = '';
            }
        }
        run();
    })();
    </script>
</body>
</html>
