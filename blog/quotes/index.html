<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摘录记录 - 谢亮的博客</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❝</text></svg>">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .blog-container { max-width: 900px; margin: 100px auto 60px; padding: 0 20px; }
        .back-link { display:inline-block; margin-bottom:20px; color:var(--secondary-color); text-decoration:none; font-size:14px; transition:var(--transition); }
        .back-link:hover { color:var(--primary-color); }
        .page-header { text-align:center; margin-bottom:40px; padding-bottom:30px; border-bottom:1px solid var(--border-color); }
        .page-title { font-size:28px; color:var(--primary-color); margin-bottom:8px; }
        .page-subtitle { color:var(--text-light); font-size:15px; }
        /* 列表 */
        .post-list { display:flex; flex-direction:column; gap:0; }
        .post-item {
            display:block; text-decoration:none; color:inherit;
            padding:22px 0; border-bottom:1px solid var(--border-color);
            transition:var(--transition);
        }
        .post-item:last-child { border-bottom:none; }
        .post-item:hover .post-title { color:var(--secondary-color); }
        .post-date { font-size:12px; color:var(--text-light); margin-bottom:6px; }
        .post-title { font-size:17px; font-weight:600; color:var(--primary-color); line-height:1.45; margin-bottom:6px; }
        .post-source-mini { font-size:12px; color:var(--secondary-color); margin-bottom:6px; word-break:break-all; opacity:.8; }
        .post-source-mini i { margin-right:4px; }
        .post-excerpt { font-size:14px; color:var(--text-light); line-height:1.65; margin-bottom:8px;
            overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
        .post-tags { display:flex; gap:6px; flex-wrap:wrap; }
        .tag { font-size:12px; background:var(--secondary-color); color:#fff; padding:3px 10px; border-radius:15px; }
        /* 空态 */
        .empty-state { text-align:center; padding:60px 20px; color:var(--text-light); }
        .empty-state i { font-size:48px; margin-bottom:16px; opacity:.4; display:block; }
        .empty-state h3 { font-size:18px; margin-bottom:8px; }
        .empty-state p { font-size:14px; max-width:380px; margin:0 auto; line-height:1.7; }
        @media(max-width:768px){ .blog-container{ margin-top:80px; } }
    </style>
</head>
<body>
    <div class="blog-container">
        <a href="../" class="back-link"><i class="fas fa-arrow-left"></i> 返回博客首页</a>

        <div class="page-header">
            <h1 class="page-title"><i class="fas fa-bookmark"></i> 摘录记录</h1>
            <p class="page-subtitle">网上看到的精彩内容，随时收藏</p>
        </div>

        <div class="post-list" id="post-list">
            <a href="十个顶级 Claude Code Skills，装上就不想卸（202604）.html" class="post-item">
                <div class="post-date">2026-04-11</div>
                <h3 class="post-title">十个顶级 Claude Code Skills，装上就不想卸</h3>
                <p class="post-excerpt">用 Claude Code 大半年了，Skills 和 Plugin 装了几十个，删了一半，留下来的都是真正改变了我工作方式的。这篇就挑十个我用得最多、也觉得最值得推荐的，每个都附安装命令，拿去直接用</p>
                <div class="post-tags"><span class="tag">Claude</span><span class="tag">Code</span><span class="tag">Skill</span><span class="tag">Superpower</span></div>
            </a>
        </div>
    </div>

    <script src="../../js/lazy-load.js"></script>
    <script>
    (function(){
        var token = localStorage.getItem('github_token');
        var owner = localStorage.getItem('github_owner');
        var repo  = localStorage.getItem('github_repo');

        function renderEmpty(msg) {
            document.getElementById('post-list').innerHTML =
                '<div class="empty-state"><i class="fas fa-bookmark"></i>' +
                '<h3>' + msg + '</h3>' +
                '<p>在主页悬浮的写作入口选择「摘录记录」，粘贴内容即可保存。</p></div>';
        }

        if (!token || !owner || !repo) {
            renderEmpty('请先登录以查看摘录');
            return;
        }

        var apiBase = 'https://api.github.com/repos/' + owner + '/' + repo + '/contents/blog/quotes';
        fetch(apiBase, { headers: { 'Authorization': 'token ' + token } })
        .then(function(r){ return r.json(); })
        .then(function(files) {
            if (!Array.isArray(files)) { renderEmpty('暂无摘录记录'); return; }
            var htmlFiles = files.filter(function(f){ return f.type==='file' && f.name.endsWith('.html') && f.name!=='index.html'; });
            if (htmlFiles.length === 0) { renderEmpty('暂无摘录记录'); return; }

            // 按文件名排序（最新在前）
            htmlFiles.sort(function(a,b){ return b.name.localeCompare(a.name); });

            // 批量获取文件内容（最多30条）
            var fetches = htmlFiles.slice(0,30).map(function(f){
                return fetch(f.download_url).then(function(r){ return r.text(); }).then(function(html){ return { name: f.name, html: html }; }).catch(function(){ return null; });
            });

            return Promise.all(fetches).then(function(results) {
                var posts = [];
                results.forEach(function(item) {
                    if (!item) return;
                    var html = item.html;
                    // 提取标题
                    var titleM = html.match(/<title>([\s\S]*?) - 谢亮<\/title>/);
                    var title = titleM ? titleM[1].trim() : '';
                    // 提取日期
                    var dateM = html.match(/<span><i class="fas fa-calendar"><\/i>\s*([\s\S]*?)<\/span>/);
                    var date = dateM ? dateM[1].trim() : item.name.substring(0,10);
                    // 提取来源
                    var srcM = html.match(/data-source="([^"]+)"/);
                    var source = srcM ? srcM[1] : '';
                    // 提取正文
                    var parasM = html.match(/<p>([\s\S]*?)<\/p>/g);
                    var excerpt = '';
                    if (parasM) {
                        var texts = parasM.map(function(p){ return p.replace(/<[^>]+>/g,'').trim(); }).filter(function(t){ return t && !t.includes('class='); });
                        excerpt = texts.slice(0,2).join(' ').slice(0,120);
                    }
                    // 提取标签
                    var tagsM = html.match(/<span class="tag">(.*?)<\/span>/g);
                    var tags = tagsM ? tagsM.map(function(t){ return t.replace(/<[^>]+>/g,''); }) : [];
                    posts.push({ title: title, date: date, source: source, excerpt: excerpt, tags: tags, file: item.name });
                });

                if (posts.length === 0) { renderEmpty('暂无摘录记录'); return; }

                document.getElementById('post-list').innerHTML = posts.map(function(p){
                    var tagsHtml = p.tags.map(function(t){ return '<span class="tag">'+t+'</span>'; }).join('');
                    var srcHtml = p.source ? '<div class="post-source-mini"><i class="fas fa-link"></i> ' + p.source.slice(0,80) + '</div>' : '';
                    return '<a href="' + p.file + '" class="post-item">' +
                        '<div class="post-date"><i class="fas fa-calendar" style="opacity:.5;margin-right:4px"></i>' + p.date + '</div>' +
                        '<h3 class="post-title">' + (p.title || '<span style="color:var(--text-light);font-style:italic">（摘录片段）</span>') + '</h3>' +
                        srcHtml +
                        (p.excerpt ? '<p class="post-excerpt">' + p.excerpt + '</p>' : '') +
                        (tagsHtml ? '<div class="post-tags">' + tagsHtml + '</div>' : '') +
                        '</a>';
                }).join('');
            });
        })
        .catch(function(){ renderEmpty('加载失败，请刷新重试'); });
    })();

    // 标签点击跳转
    document.addEventListener('click', function(e){
        var tag = e.target.closest('.tag');
        if (tag) { e.preventDefault(); e.stopPropagation(); location.href = '../tags.html?tag=' + encodeURIComponent(tag.textContent.trim()); }
    });
    </script>
</body>
</html>
