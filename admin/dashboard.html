<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 个人主页</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-header {
            background: var(--bg-primary);
            box-shadow: var(--shadow-md);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .admin-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .admin-nav h2 {
            color: var(--text-primary);
            font-size: 24px;
        }
        
        .nav-links {
            display: flex;
            gap: 16px;
        }
        
        .nav-link {
            padding: 8px 16px;
            background: var(--bg-secondary);
            border-radius: 8px;
            color: var(--text-primary);
            text-decoration: none;
            transition: var(--transition);
        }
        
        .nav-link:hover,
        .nav-link.active {
            background: var(--primary-color);
            color: white;
        }
        
        .logout-btn {
            padding: 8px 16px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .logout-btn:hover {
            background: #dc2626;
        }
        
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .admin-section {
            display: none;
        }
        
        .admin-section.active {
            display: block;
        }
        
        .section-header {
            margin-bottom: 32px;
        }
        
        .section-header h3 {
            font-size: 28px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .section-header p {
            color: var(--text-secondary);
        }
        
        /* 博客撰写 */
        .blog-editor {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-md);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            transition: var(--transition);
            font-family: inherit;
        }
        
        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .form-textarea {
            min-height: 400px;
            resize: vertical;
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn-primary {
            background: var(--primary-color);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        
        .btn-secondary:hover {
            background: var(--border-color);
        }
        
        /* 文件上传 */
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 60px 40px;
            text-align: center;
            transition: var(--transition);
            cursor: pointer;
        }
        
        .upload-area:hover {
            border-color: var(--primary-color);
            background: var(--bg-secondary);
        }
        
        .upload-area.dragover {
            border-color: var(--primary-color);
            background: rgba(59, 130, 246, 0.1);
        }
        
        .upload-icon {
            font-size: 48px;
            color: var(--text-light);
            margin-bottom: 16px;
        }
        
        .upload-text {
            font-size: 18px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .upload-hint {
            font-size: 14px;
            color: var(--text-light);
        }
        
        .file-input {
            display: none;
        }
        
        .file-list {
            margin-top: 32px;
        }
        
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
        }
        
        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .file-icon {
            font-size: 24px;
            color: var(--primary-color);
        }
        
        .file-name {
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .file-size {
            font-size: 14px;
            color: var(--text-light);
        }
        
        .file-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn-small {
            padding: 6px 12px;
            font-size: 14px;
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
        }
        
        /* 进度条 */
        .progress {
            width: 100%;
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }
        
        .progress-bar {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        /* 提示信息 */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        
        .alert-info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #bfdbfe;
        }
        
        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <div class="container">
            <div class="admin-nav">
                <h2>管理后台</h2>
                <div class="nav-links">
                    <a href="#" class="nav-link active" data-section="blog">撰写博客</a>
                    <a href="#" class="nav-link" data-section="files">上传文件</a>
                    <a href="#" class="nav-link" data-section="profile">修改信息</a>
                    <a href="#" class="nav-link" data-section="settings">设置</a>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> 退出
                </button>
            </div>
        </div>
    </header>

    <div class="admin-container">
        <!-- 博客撰写 -->
        <section id="blog-section" class="admin-section active">
            <div class="section-header">
                <h3>撰写博客</h3>
                <p>创建新的博客文章，支持Markdown格式</p>
            </div>
            
            <div id="blog-alert" class="alert"></div>
            
            <div class="blog-editor">
                <form id="blogForm">
                    <div class="form-group">
                        <label class="form-label" for="blog-title">文章标题</label>
                        <input type="text" id="blog-title" class="form-input" placeholder="请输入文章标题" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="blog-category">文章分类</label>
                        <select id="blog-category" class="form-select" required>
                            <option value="">请选择分类</option>
                            <option value="tech">技术思考</option>
                            <option value="life">生活日记</option>
                            <option value="books">书籍阅读</option>
                            <option value="analysis">数据分析</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="blog-tags">标签（用逗号分隔）</label>
                        <input type="text" id="blog-tags" class="form-input" placeholder="例如: 机器学习, Python, 科研">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="blog-content">文章内容（支持Markdown）</label>
                        <textarea id="blog-content" class="form-textarea" placeholder="请输入文章内容..." required></textarea>
                    </div>
                    
                    <div class="btn-group">
                        <button type="button" class="btn btn-secondary" onclick="previewBlog()">
                            <i class="fas fa-eye"></i> 预览
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="saveDraft()">
                            <i class="fas fa-save"></i> 保存草稿
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-paper-plane"></i> 发布文章
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <!-- 文件上传 -->
        <section id="files-section" class="admin-section">
            <div class="section-header">
                <h3>上传文件</h3>
                <p>上传图片、文档等文件到GitHub仓库</p>
            </div>
            
            <div id="file-alert" class="alert"></div>
            
            <div class="upload-area" onclick="document.getElementById('file-input').click()">
                <div class="upload-icon">
                    <i class="fas fa-cloud-upload-alt"></i>
                </div>
                <div class="upload-text">
                    点击或拖拽文件到此处上传
                </div>
                <div class="upload-hint">
                    支持图片、文档等文件，单个文件最大10MB
                </div>
                <input type="file" id="file-input" class="file-input" multiple onchange="fileManager.handleFileSelect(event)">
            </div>
            
            <div class="form-group">
                <label class="form-label">上传目录</label>
                <select id="upload-directory" class="form-select">
                    <option value="files/photos/">照片相册</option>
                    <option value="files/documents/">文档资料</option>
                    <option value="blog/images/">博客图片</option>
                </select>
            </div>
            
            <div id="file-list" class="file-list"></div>
        </section>

        <!-- 修改个人信息 -->
        <section id="profile-section" class="admin-section">
            <div class="section-header">
                <h3>修改个人信息</h3>
                <p>编辑主页的个人信息、教育背景、科研成果等内容</p>
            </div>
            
            <div id="profile-alert" class="alert"></div>
            
            <div class="blog-editor">
                <form id="profileForm">
                    <div class="form-group">
                        <label class="form-label" for="profile-name">姓名</label>
                        <input type="text" id="profile-name" class="form-input" placeholder="请输入姓名" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="profile-title">职称/学位</label>
                        <input type="text" id="profile-title" class="form-input" placeholder="例如：工学博士" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="profile-bio">个人简介</label>
                        <textarea id="profile-bio" class="form-textarea" rows="6" placeholder="请输入个人简介" required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="profile-tags">标签（用逗号分隔）</label>
                        <input type="text" id="profile-tags" class="form-input" placeholder="例如：电催化制氢, 机器学习">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="profile-email">邮箱</label>
                        <input type="email" id="profile-email" class="form-input" placeholder="请输入邮箱">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="profile-phone">电话</label>
                        <input type="tel" id="profile-phone" class="form-input" placeholder="请输入电话">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="profile-address">地址</label>
                        <input type="text" id="profile-address" class="form-input" placeholder="请输入地址">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="profile-github">GitHub 链接</label>
                        <input type="url" id="profile-github" class="form-input" placeholder="例如：https://github.com/xie-l">
                    </div>

                    <hr style="margin: 30px 0; border: none; border-top: 1px solid var(--border-color);">
                    <h4 style="color: var(--text-primary); margin-bottom: 20px;">个人简介（主页正文）</h4>
                    <div class="form-group">
                        <label class="form-label" for="profile-about">简介段落（每行一段，自动生成为独立段落）</label>
                        <textarea id="profile-about" class="form-textarea" rows="12" placeholder="每一行为一个段落，保存后自动更新主页简介区域。"></textarea>
                    </div>

                    <div class="alert alert-info" style="display:block; margin-bottom:0;">
                        <i class="fas fa-info-circle"></i>
                        <strong>教育背景、科研项目、论文成果、获奖荣誉</strong>等详细模块内容较复杂，请直接编辑 <code>index.html</code> 源文件进行修改，保存后自动部署。
                    </div>
                    
                    <div class="btn-group">
                        <button type="button" class="btn btn-secondary" onclick="previewProfile()">
                            <i class="fas fa-eye"></i> 预览
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> 保存并更新主页
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <!-- 设置 -->
        <section id="settings-section" class="admin-section">
            <div class="section-header">
                <h3>设置</h3>
                <p>管理您的GitHub配置</p>
            </div>
            
            <div class="blog-editor">
                <div class="form-group">
                    <label class="form-label">GitHub Token</label>
                    <input type="password" id="settings-token" class="form-input" readonly>
                    <small style="color: var(--text-light);">Token已安全存储在浏览器中</small>
                </div>
                
                <div class="form-group">
                    <label class="form-label">仓库名称</label>
                    <input type="text" id="settings-repo" class="form-input" readonly>
                </div>
                
                <div class="form-group">
                    <label class="form-label">仓库所有者</label>
                    <input type="text" id="settings-owner" class="form-input" readonly>
                </div>
                
                <button class="btn btn-danger" onclick="clearSettings()">
                    <i class="fas fa-trash"></i> 清除本地设置
                </button>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="profile-editor.js"></script>
    <script src="main.js"></script>
</body>
</html>
