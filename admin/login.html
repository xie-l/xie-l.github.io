<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 个人主页管理</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: var(--bg-primary);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-header h2 {
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .login-header p {
            color: var(--text-secondary);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            transition: var(--transition);
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .btn-primary {
            width: 100%;
            padding: 12px 24px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        
        .alert-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="login-header">
                <h2>GitHub 登录</h2>
                <p>使用 GitHub 账号登录以管理您的个人主页</p>
            </div>
            
            <div id="alert" class="alert"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="token">GitHub Personal Access Token</label>
                    <input type="password" id="token" class="form-input" placeholder="ghp_xxxxxxxxxxxxxxxx" required>
                    <small style="color: var(--text-light);">在 GitHub Settings > Developer settings > Personal access tokens 中生成</small>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="repo">仓库名称</label>
                    <input type="text" id="repo" class="form-input" placeholder="xie-l.github.io" value="xie-l.github.io" required>
                </div>
                
                <button type="submit" class="btn-primary">登录</button>
            </form>
            
            <div style="margin-top: 24px; text-align: center;">
                <a href="../index.html" style="color: var(--text-secondary); font-size: 14px;">
                    <i class="fas fa-arrow-left"></i> 返回主页
                </a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const token = document.getElementById('token').value;
            const repo = document.getElementById('repo').value;
            
            // 验证token格式
            if (!token.startsWith('ghp_') && !token.startsWith('github_pat_')) {
                showAlert('Token 格式不正确，请以 ghp_ 或 github_pat_ 开头', 'error');
                return;
            }
            
            // 保存到localStorage
            localStorage.setItem('github_token', token);
            localStorage.setItem('github_repo', repo);
            localStorage.setItem('github_owner', repo.split('.')[0]);
            
            showAlert('登录成功！正在跳转...', 'success');
            
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        });
        
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
