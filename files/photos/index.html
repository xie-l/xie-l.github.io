<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片相册 - 谢亮</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gallery-container {
            max-width: 1200px;
            margin: 100px auto 50px;
            padding: 0 20px;
        }
        .gallery-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .gallery-header h1 {
            font-size: 32px;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        .gallery-header p {
            color: var(--text-light);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--secondary-color);
            text-decoration: none;
            transition: var(--transition);
        }
        .back-link:hover {
            color: var(--primary-color);
        }
        .upload-tip {
            background: #e3f2fd;
            border-left: 4px solid var(--secondary-color);
            padding: 15px;
            margin-bottom: 30px;
            border-radius: 5px;
        }
        .upload-tip p {
            margin: 0;
            color: var(--text-color);
        }
        .upload-tip code {
            background: rgba(0,0,0,0.05);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .photo-item {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .photo-item:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }
        .photo-placeholder {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
        }
        .photo-info {
            padding: 15px;
        }
        .photo-name {
            font-size: 14px;
            color: var(--primary-color);
            margin-bottom: 5px;
            word-break: break-all;
        }
        .photo-date {
            font-size: 12px;
            color: var(--text-light);
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        .empty-state h3 {
            margin-bottom: 10px;
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="gallery-container">
        <a href="../" class="back-link">
            <i class="fas fa-arrow-left"></i> 返回文件管理
        </a>

        <div class="gallery-header">
            <h1>照片相册</h1>
            <p>浏览和管理您的照片</p>
        </div>

        <div class="upload-tip">
            <p><i class="fas fa-info-circle"></i> <strong>提示：</strong>要上传照片，请将图片文件放入 <code>files/photos/</code> 目录，然后使用Git提交并推送。</p>
        </div>

        <div class="photo-grid">
            <div class="empty-state">
                <i class="fas fa-images"></i>
                <h3>暂无照片</h3>
                <p>上传您的第一张照片吧！</p>
            </div>
        </div>

        <div style="margin-top: 40px; text-align: center; color: var(--text-light);">
            <p><i class="fas fa-lightbulb"></i> 支持的照片格式：JPG, JPEG, PNG, GIF, WebP</p>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 谢亮. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
