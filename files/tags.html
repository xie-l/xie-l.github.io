<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件标签 - 谢亮</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏷️</text></svg>">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .fc { max-width: 900px; margin: 100px auto 60px; padding: 0 20px; }
        .back-link { display:inline-block; margin-bottom:20px; color:var(--secondary-color); text-decoration:none; }
        .tag-header { margin-bottom: 28px; }
        .tag-header h1 { font-size:24px; color:var(--primary-color); display:flex; align-items:center; gap:10px; }
        .tag-badge { background:var(--secondary-color); color:#fff; padding:4px 16px; border-radius:20px; font-size:16px; font-weight:600; }
        .tag-header p { color:var(--text-light); font-size:14px; margin-top:8px; }
        .file-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; margin-bottom:30px; }
        .photo-card { background:var(--card-bg); border-radius:10px; overflow:hidden; box-shadow:var(--shadow); text-decoration:none; display:block; transition:var(--transition); }
        .photo-card:hover { transform:translateY(-4px); box-shadow:var(--shadow-hover); }
        .photo-card img { width:100%; height:155px; object-fit:cover; display:block; }
        .photo-card .pi { padding:9px 12px; }
        .photo-card .pn { font-size:12px; color:var(--text-color); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .doc-list { display:flex; flex-direction:column; gap:10px; }
        .doc-item { display:flex; align-items:center; gap:14px; padding:12px 16px; background:var(--card-bg); border-radius:8px; box-shadow:var(--shadow); text-decoration:none; color:var(--text-color); transition:var(--transition); }
        .doc-item:hover { transform:translateX(4px); box-shadow:var(--shadow-hover); }
        .doc-item i { font-size:22px; color:var(--secondary-color); width:26px; text-align:center; }
        .doc-item .fm { flex:1; }
        .doc-item .fn { font-size:14px; font-weight:500; }
        .doc-item .fs { font-size:12px; color:var(--text-light); }
        .section-title { font-size:16px; font-weight:700; color:var(--primary-color); margin:20px 0 12px; }
        .sb { text-align:center; padding:50px; color:var(--text-light); font-size:14px; }
    </style>
</head>
<body>
    <div class="fc">
        <a href="./" class="back-link"><i class="fas fa-arrow-left"></i> 返回文件资源</a>
        <div class="tag-header">
            <h1><i class="fas fa-tag"></i> 标签：<span class="tag-badge" id="tag-name">...</span></h1>
            <p id="tag-summary">正在加载...</p>
        </div>
        <div id="file-container">
            <div class="sb"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>
        </div>
    </div>
    <script>
    (function(){
        const OWNER = 'xie-l', REPO = 'xie-l.github.io';
        const currentTag = decodeURIComponent(new URLSearchParams(location.search).get('tag') || '');
        document.title = '标签：' + currentTag + ' - 谢亮';
        document.getElementById('tag-name').textContent = currentTag || '（未指定）';

        const IMGS = new Set(['jpg','jpeg','png','gif','webp','svg','bmp','heic','avif']);
        function ext(n){ return (n.split('.').pop()||'').toLowerCase(); }
        function esc(s){ return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
        function fmt(b){ if(!b)return''; if(b<1024)return b+' B'; if(b<1048576)return(b/1024).toFixed(1)+' KB'; return(b/1048576).toFixed(1)+' MB'; }

        async function run() {
            const box = document.getElementById('file-container');
            const summary = document.getElementById('tag-summary');
            if (!currentTag) {
                box.innerHTML = '<div class="sb">未指定标签</div>'; summary.textContent = ''; return;
            }
            try {
                const res = await fetch('https://raw.githubusercontent.com/' + OWNER + '/' + REPO + '/main/data/files-index.json?_=' + Date.now());
                if (!res.ok) throw new Error('index not found');
                const data = await res.json();
                const matched = (data.files || []).filter(function(f){
                    return (f.tags || []).includes(currentTag);
                });
                summary.textContent = '找到 ' + matched.length + ' 个含此标签的文件';
                if (matched.length === 0) {
                    box.innerHTML = '<div class="sb"><i class="fas fa-search"></i><br>暂无含有此标签的文件</div>'; return;
                }
                const photos = matched.filter(function(f){ return IMGS.has(ext(f.name)); });
                const docs   = matched.filter(function(f){ return !IMGS.has(ext(f.name)); });
                let html = '';
                if (photos.length > 0) {
                    html += '<div class="section-title"><i class="fas fa-images" style="margin-right:6px"></i>图片（' + photos.length + '）</div><div class="file-grid">';
                    photos.forEach(function(f){
                        const rawUrl = 'https://raw.githubusercontent.com/' + OWNER + '/' + REPO + '/main/' + f.path;
                        html += '<a href="' + rawUrl + '" target="_blank" class="photo-card">' +
                            '<img src="' + rawUrl + '" alt="' + esc(f.name) + '" loading="lazy" onerror="this.style.height=\'60px\'">' +
                            '<div class="pi"><div class="pn">' + esc(f.name) + '</div></div></a>';
                    });
                    html += '</div>';
                }
                if (docs.length > 0) {
                    html += '<div class="section-title"><i class="fas fa-file-alt" style="margin-right:6px"></i>文档（' + docs.length + '）</div><div class="doc-list">';
                    docs.forEach(function(f){
                        const rawUrl = 'https://raw.githubusercontent.com/' + OWNER + '/' + REPO + '/main/' + f.path;
                        const e = ext(f.name);
                        const icon = e==='pdf'?'fa-file-pdf':e==='doc'||e==='docx'?'fa-file-word':e==='xls'||e==='xlsx'?'fa-file-excel':'fa-file';
                        html += '<a href="' + rawUrl + '" target="_blank" class="doc-item">' +
                            '<i class="fas ' + icon + '"></i>' +
                            '<div class="fm"><div class="fn">' + esc(f.name) + '</div>' +
                            '<div class="fs">' + fmt(f.size) + '  ·  上传于 ' + (f.uploadedAt||'') + '</div></div>' +
                            '<i class="fas fa-download" style="font-size:14px;color:var(--text-light)"></i></a>';
                    });
                    html += '</div>';
                }
                box.innerHTML = html;
            } catch(e) {
                box.innerHTML = '<div class="sb"><i class="fas fa-exclamation-circle"></i> 加载失败，请刷新重试</div>';
                summary.textContent = '';
            }
        }
        run();
    })();
    </script>
</body>
</html>
