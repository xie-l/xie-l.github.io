<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档资料 - 谢亮</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .fc { max-width: 900px; margin: 100px auto 60px; padding: 0 20px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: var(--secondary-color); text-decoration: none; }
        .ph { margin-bottom: 28px; }
        .ph h1 { font-size: 26px; color: var(--primary-color); }
        .ph p  { color: var(--text-light); font-size: 13px; margin-top: 6px; }
        .fl { display: flex; flex-direction: column; gap: 12px; }
        .fi { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: var(--card-bg); border-radius: 10px; box-shadow: var(--shadow); text-decoration: none; color: var(--text-color); transition: var(--transition); }
        .fi:hover { box-shadow: var(--shadow-hover); transform: translateX(4px); }
        .fi .ic { font-size: 26px; width: 30px; text-align: center; flex-shrink: 0; }
        .fi .fm { flex: 1; }
        .fi .fn { font-size: 14px; font-weight: 500; color: var(--primary-color); }
        .fi .fs { font-size: 12px; color: var(--text-light); margin-top: 3px; }
        .fi .dl { font-size: 13px; color: var(--secondary-color); white-space: nowrap; }
        .sb { text-align: center; padding: 50px; color: var(--text-light); font-size: 14px; }
        .ico-pdf { color: #e74c3c; }
        .ico-doc { color: #2980b9; }
        .ico-xls { color: #27ae60; }
        .ico-ppt { color: #e67e22; }
        .ico-img { color: var(--secondary-color); }
        .ico-def { color: var(--text-light); }
    </style>
</head>
<body>
    <div class="fc">
        <a href="../" class="back-link"><i class="fas fa-arrow-left"></i> 返回文件资源</a>
        <div class="ph">
            <h1><i class="fas fa-file-alt" style="color:var(--secondary-color);margin-right:8px"></i>文档资料</h1>
            <p id="fc-count">正在从 GitHub 加载文件列表...</p>
        </div>
        <div id="fc-box"><div class="sb"><i class="fas fa-spinner fa-spin"></i> 加载中...</div></div>
    </div>
    <script>
    (function(){
        const OWNER='xie-l', REPO='xie-l.github.io', DIR='files/documents';
        function fmt(b){ if(!b)return''; if(b<1024)return b+' B'; if(b<1048576)return(b/1024).toFixed(1)+' KB'; return(b/1048576).toFixed(1)+' MB'; }
        function ex(n){ return(n.split('.').pop()||'').toLowerCase(); }
        /* 直接用 GitHub API 返回的 download_url，无需自行编码 */
        function iconClass(e){
            const m={pdf:'fa-file-pdf ico-pdf',doc:'fa-file-word ico-doc',docx:'fa-file-word ico-doc',xls:'fa-file-excel ico-xls',xlsx:'fa-file-excel ico-xls',ppt:'fa-file-powerpoint ico-ppt',pptx:'fa-file-powerpoint ico-ppt',jpg:'fa-file-image ico-img',jpeg:'fa-file-image ico-img',png:'fa-file-image ico-img'};
            return m[e]||'fa-file ico-def';
        }
        async function load(){
            const box=document.getElementById('fc-box'), cnt=document.getElementById('fc-count');
            try{
                const res=await fetch('https://api.github.com/repos/'+OWNER+'/'+REPO+'/contents/'+DIR,{signal:AbortSignal.timeout(8000)});
                if(!res.ok){box.innerHTML='<div class="sb">目录为空或暂无文件</div>';cnt.textContent='';return;}
                const all=(await res.json()).filter(f=>f.type==='file' && f.name!=='index.html');
                cnt.textContent='共 '+all.length+' 个文件，点击可查看/下载';
                if(all.length===0){box.innerHTML='<div class="sb">暂无文档，请通过管理后台上传</div>';return;}
                let html='<div class="fl">';
                all.forEach(f=>{
                    const u=f.download_url, e=ex(f.name), ic=iconClass(e);
                    html+='<a href="'+u+'" target="_blank" class="fi">'+
                        '<i class="fas '+ic+' ic"></i>'+
                        '<div class="fm"><div class="fn">'+f.name+'</div><div class="fs">'+fmt(f.size)+'</div></div>'+
                        '<span class="dl"><i class="fas fa-download"></i> 下载</span></a>';
                });
                html+='</div>';
                box.innerHTML=html;
            }catch(e){
                box.innerHTML='<div class="sb"><i class="fas fa-exclamation-circle"></i> 加载失败，请刷新页面</div>';
            }
        }
        load();
    })();
    </script>
</body>
</html>
